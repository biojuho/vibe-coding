# blind-to-x 콘텐츠 분류 규칙
# content_intelligence.py 에서 이 파일을 로드합니다.
# 규칙 수정은 코드 배포 없이 이 파일만 편집하면 됩니다.

topic_rules:
  - label: "연봉"
    keywords: ["연봉", "월급", "성과급", "보너스", "급여", "임금", "인상"]
  - label: "이직"
    keywords: ["이직", "퇴사", "취업", "면접", "채용", "오퍼", "커리어"]
  - label: "회사문화"
    keywords: ["회사", "조직", "문화", "팀장", "상사", "팀원", "평가", "인사"]
  - label: "상사"
    keywords: ["상사", "부장", "팀장", "임원", "매니저", "관리자"]
  - label: "복지"
    keywords: ["복지", "재택", "휴가", "워라밸", "식대", "지원금", "사내"]
  - label: "연애"
    keywords: ["연애", "소개팅", "썸", "남친", "여친", "플러팅"]
  - label: "결혼"
    keywords: ["결혼", "신혼", "배우자", "남편", "아내", "이혼"]
  - label: "가족"
    keywords: ["가족", "부모", "엄마", "아빠", "자녀", "육아"]
  - label: "재테크"
    keywords: ["주식", "코인", "재테크", "부동산", "투자", "대출"]
  - label: "직장개그"
    keywords: ["웃김", "개웃", "현웃", "짤", "썰", "실화", "밈"]
  # P0-A2: 토픽 확장 (10→15개)
  - label: "부동산"
    keywords: ["아파트", "전세", "월세", "청약", "집값", "매매", "분양"]
  - label: "IT"
    keywords: ["개발자", "코딩", "AI", "GPT", "프로그래밍", "서버", "데이터"]
  - label: "건강"
    keywords: ["운동", "건강", "헬스", "다이어트", "병원", "수면", "스트레스"]
  - label: "정치"
    keywords: ["정치", "대통령", "국회", "선거", "정당", "법안", "규제"]
  - label: "자기계발"
    keywords: ["공부", "자격증", "영어", "독서", "사이드프로젝트", "성장", "MBA"]
  - label: "금융/경제"
    keywords: ["금리", "주식", "경제", "투자", "환율", "대출", "물가"]
  - label: "뷰티/라이프"
    keywords: ["뷰티", "화장품", "라이프스타일", "피부", "미용", "패션", "관리"]

emotion_rules:
  - label: "분노"
    keywords: ["빡", "열받", "화나", "분노", "짜증", "억까"]
  - label: "허탈"
    keywords: ["허탈", "허무", "현타", "공허", "멘붕"]
  - label: "공감"
    keywords: ["공감", "이해", "맞말", "다들", "나만", "저만"]
  - label: "웃김"
    keywords: ["웃김", "개웃", "현웃", "웃겨", "유머", "짤"]
  - label: "경악"
    keywords: ["충격", "미쳤", "실화", "레전드", "소름"]
  - label: "현타"
    keywords: ["현타", "퇴사 마렵", "현실", "지친", "번아웃"]
  - label: "통찰"
    keywords: ["인사이트", "배운", "느낀", "교훈", "정리"]
  # P0-A2: 감정 축 확장 (7→10개)
  - label: "자부심"
    keywords: ["자랑", "뿌듯", "성취", "해냈", "인정받", "칭찬"]
  - label: "불안"
    keywords: ["불안", "걱정", "두렵", "막막", "앞이 안 보", "어떡하지"]
  - label: "기대감"
    keywords: ["기대", "설레", "드디어", "곧", "기다", "두근"]

audience_rules:
  - label: "초년생"
    keywords: ["신입", "주니어", "첫회사", "사회초년생"]
  - label: "이직준비층"
    keywords: ["이직", "오퍼", "면접", "취준", "구직"]
  - label: "관리자층"
    keywords: ["팀장", "리더", "매니저", "임원", "관리자"]
  - label: "전직장인"
    keywords: ["회사", "직장", "출근", "퇴근", "상사", "팀원"]

hook_rules:
  논쟁형:
    keywords: ["왜", "vs", "맞아?", "어떰", "어떻게 생각", "논란", "?"]
  정보형:
    keywords: ["정리", "팁", "방법", "요약", "가이드", "체크리스트"]
  짤형:
    keywords: ["짤", "웃김", "현웃", "개웃", "밈"]
  # 한줄팩폭형: emotion_axis가 분노/허탈/현타 이고 content < 180자인 경우
  # 나머지는 공감형 (default)

# ===================================================================
# P0-A1: 골든 예시 (토픽별 S/A등급 트윗 레퍼런스)
# ===================================================================
golden_examples:
  연봉:
    - text: "블라인드에서 연봉 5천 자랑글 밑에 달린 댓글이 레전드... '저는 5천이 월급인데요' 🥲 직장인 세계는 넓고 연봉은 다양하다"
      grade: "S"
      hook_type: "공감형"
    - text: "성과급 0% 통보받고 팀장이 '내년에 잘하자'래요. 내년에 여기 있을 거 같아요? 😂"
      grade: "A"
      hook_type: "논쟁형"
  이직:
    - text: "면접 5번 보고 최종 합격했는데 현 회사 카운터오퍼가 더 높음. 이직의 진짜 가치는 '내 몸값 확인'이었다"
      grade: "S"
      hook_type: "통찰형"
    - text: "퇴사 결심하니까 갑자기 다 보여요. 회사가 나를 얼마나 신경 안 썼는지..."
      grade: "A"
      hook_type: "공감형"
  회사문화:
    - text: "회의 시작 5분 전에 '이거 검토해봐' 던지는 문화... 대한민국 직장의 시간 개념은 상사 기준입니다"
      grade: "S"
      hook_type: "논쟁형"
    - text: "야근이 능력인 줄 아는 회사 vs 칼퇴가 당연한 회사. 같은 연봉이면 뭘 고르실?"
      grade: "A"
      hook_type: "논쟁형"
  상사:
    - text: "팀장님이 '우리 팀은 수평적이야'라고 하셨는데 그 말 끝나기도 전에 '야, 이거 다시 해와' 🙃"
      grade: "S"
      hook_type: "짤형"
  복지:
    - text: "자유 연차 쓴다고 했더니 '이유가 뭔데?'라고 묻는 회사... 자유의 정의를 다시 생각하게 됩니다"
      grade: "A"
      hook_type: "공감형"
  재테크:
    - text: "월급의 40%가 고정비로 빠지는데 재테크를 하라고? 먼저 생존테크 좀 하겠습니다 🙏"
      grade: "A"
      hook_type: "공감형"
  직장개그:
    - text: "월요일 아침 팀 회의에서 '다들 주말 잘 보냈어요?'라는 질문에 진심으로 대답하면 분위기 이상해지는 직장생활"
      grade: "S"
      hook_type: "짤형"
  부동산:
    - text: "전세 만기 다가오는데 집주인이 5천 올리겠다고... 직장인에게 전세 만기는 두 번째 퇴사 통보입니다"
      grade: "A"
      hook_type: "공감형"
  IT:
    - text: "개발자 연봉이 높다길래 코딩 배웠는데, 진짜 높은 건 야근 시간이었습니다"
      grade: "A"
      hook_type: "짤형"
  건강:
    - text: "직장인 건강검진 결과를 받아봤는데... 나이보다 회사가 더 나를 늙게 만들고 있었다"
      grade: "A"
      hook_type: "공감형"
  자기계발:
    - text: "퇴근 후에 공부하라는 말은 쉽죠. 해보신 분? 침대가 이기는 비율 99.7%"
      grade: "A"
      hook_type: "짤형"

# ===================================================================
# P6: Threads 전용 골든 예시 (캐주얼 톤, 500자 이내, 해시태그 3개)
# ===================================================================
golden_examples_threads:
  연봉:
    - text: |
        블라인드에서 연봉 5천 자랑글에 달린 댓글 봤어요?
        '저는 5천이 월급인데요' 🥲
        직장인 세계는 넓고 연봉은 다양하다...
        여러분은 연봉에 만족하시나요? 솔직히 댓글로 알려주세요 👇
        #연봉 #직장인 #현실
      grade: "S"
    - text: |
        성과급 0% 통보받고 팀장이 '내년에 잘하자'래요.
        내년에 여기 있을 거 같아요? 😂
        이거 저만 그런 거 아니죠...?
        #성과급 #직장인현실 #이직
      grade: "A"
  이직:
    - text: |
        면접 5번 보고 최종 합격했는데
        현 회사 카운터오퍼가 더 높음.
        이직의 진짜 가치는 '내 몸값 확인'이었다는 사실.
        이직은 배신이 아니라 생존이에요 🙌
        #이직 #카운터오퍼 #자기가치
      grade: "S"
  회사문화:
    - text: |
        회의 5분 전에 '이거 검토해봐' 던지는 건 진짜 국룰이죠?
        대한민국 직장의 시간 개념 = 상사 기준
        공감되시면 저장해두세요 ☑️
        #회사문화 #직장인 #공감
      grade: "S"
  직장개그:
    - text: |
        월요일 아침 팀 회의에서
        '다들 주말 잘 보냈어요?'
        이 질문에 진심으로 대답하면 분위기 이상해지는 직장생활 ㅋㅋ
        #월요병 #직장인 #현실
      grade: "S"
  재테크:
    - text: |
        월급의 40%가 고정비로 빠지는데
        재테크를 하라고요?
        먼저 생존테크 좀 하겠습니다 🙏
        비슷한 분 댓글 남겨주세요...
        #재테크 #월급 #생존
      grade: "A"

# ===================================================================
# P6: 네이버 블로그 전용 골든 예시 (SEO 최적화, 1500~3000자, 소제목 구조)
# ===================================================================
golden_examples_naver_blog:
  연봉:
    - title: "2024 직장인 연봉 현실 총정리 | 블라인드 실제 사례로 보는 연봉 격차"
      structure: |
        ## 블라인드에서 화제된 연봉 이야기
        (도입부: 왜 이 주제가 직장인 사이에서 화제인지)

        ## 실제 사례: 연봉 5천이 월급인 사람도 있다?
        (본문: 구체적인 사례와 데이터)

        ## 연봉 협상, 어떻게 접근해야 할까?
        (인사이트: 실질적인 조언과 팁)

        ## 마무리: 내 연봉의 적정선은?
        (결론 + CTA: 댓글 유도)

        #연봉 #직장인연봉 #블라인드 #연봉협상 #성과급 #이직 #커리어
        #직장인현실 #월급 #연봉인상 #2024연봉 #취업 #인사평가 #보너스 #재테크
      grade: "S"
  이직:
    - title: "이직 성공기 | 면접 5번 만에 합격, 그런데 현 회사 카운터오퍼가 더 높다?"
      structure: |
        ## 이직을 결심한 계기
        (도입부: 공감가는 상황 설명)

        ## 면접 5번의 여정
        (과정: 구체적인 면접 경험과 느낀 점)

        ## 카운터오퍼의 함정
        (인사이트: 카운터오퍼를 받았을 때 고려할 점)

        ## 이직의 진짜 가치
        (결론: 내 몸값을 아는 것의 중요성)

        #이직 #면접 #카운터오퍼 #직장인이직 #퇴사 #커리어 #몸값
        #이직성공 #면접후기 #연봉협상 #직장인 #취업 #경력직 #채용 #오퍼
      grade: "S"

# ===================================================================
# P0-A1: 톤 매핑 — 플랫폼별 분기 (토픽 클러스터 → 자동 톤 결정)
# ===================================================================
tone_mapping:
  # 기본 톤 (X/Twitter 기준, 하위 호환 유지)
  연봉: "인사이트와 팩트를 섞어 정리하는 톤, 비교 데이터 활용"
  이직: "직장인에게 실질적인 도움을 주는 조언형 톤, 용기를 주되 현실적으로"
  회사문화: "직장 밈과 현실 공감을 섞은 톤, '맞아맞아' 반응 유발"
  상사: "위트 있고 풍자적인 톤, 같이 웃으면서 공감하도록"
  복지: "정보와 공감을 섞은 톤, 비교 관점 제시"
  연애: "친구에게 말하듯 다정하고 공감이 강한 톤"
  결혼: "담백하지만 울림이 있는 톤, 현실 조언 포함"
  가족: "담백하지만 울림이 있는 톤, 따뜻한 감성"
  재테크: "인사이트와 팩트를 섞어 정리하는 톤, 실전 경험 중심"
  직장개그: "밈과 유머 중심의 가벼운 톤, 웃음 포인트 극대화"
  부동산: "현실 공감 + 데이터 기반 정보 톤, 직장인 시각"
  IT: "기술 트렌드와 직장인 공감을 섞은 톤, 개발자 유머 활용"
  건강: "걱정이 되지만 가볍게 접근하는 톤, 실천 가능한 팁 포함"
  정치: "중립적이고 팩트 중심의 톤, 직장인 시각으로 해석"
  자기계발: "동기부여와 현실 사이의 균형 잡힌 톤, 공감 우선"
  금융/경제: "인사이트와 팩트를 섞어 정리하는 톤, 최신 동향 반영"
  뷰티/라이프: "트렌디하고 공감 가는 톤, 실용적인 직장인 관리 정보 제공"
  기타: "위트 있고 공감 가는 범용 톤"

# P6: Threads 전용 톤 매핑 (캐주얼, 대화형, 저장 유도)
tone_mapping_threads:
  연봉: "친구한테 얘기하듯 캐주얼하게, 구체적 숫자로 충격 포인트 만들기, 저장 유도"
  이직: "응원하는 친구 톤, '나도 그랬어' 공감 우선, 경험담 형식"
  회사문화: "직장인 밈 + 짧은 에피소드 형식, '맞아맞아' 댓글 유도"
  상사: "TMI 풀듯 캐주얼하게 풀어내기, 웃기게 but 공감되게"
  복지: "비교 리스트 형태, '여러분 회사는?' 질문으로 댓글 유도"
  연애: "썸 타는 친구한테 조언하듯, 아이콘 활용"
  결혼: "솔직하고 현실적인 선배 톤, 공감 질문 마무리"
  가족: "따뜻하지만 현실적인 톤, 감정 이모지 활용"
  재테크: "'나도 이렇게 했어' 경험담 형식, 실패 사례도 솔직하게"
  직장개그: "순수 웃음 유발, 줄바꿈 활용한 타이밍 개그"
  부동산: "한숨 나오는 현실을 캐주얼하게, 동세대 공감"
  IT: "개발자 밈 + 직장인 공감 크로스, 이모지 적극 활용"
  건강: "'나도 걱정...' 공감형, 작은 실천 팁 포함"
  정치: "팩트 위주 but 직장인 생활 영향 중심, 중립 톤"
  자기계발: "'하고 싶은데 못하겠어' 공감 우선, 작은 성공담 포함"
  금융/경제: "월급쟁이 시각으로 풀어쓰기, 핵심만 짧게"
  뷰티/라이프: "일상 공유 형태, 사진 연상되는 묘사, 꿀팁 포함"
  기타: "친구한테 DM 보내듯 캐주얼하고 솔직한 톤"

# P6: 네이버 블로그 전용 톤 매핑 (SEO, 정보성, 소제목 구조)
tone_mapping_naver_blog:
  연봉: "객관적 데이터 + 사례 중심, 검색 유입 키워드 자연스럽게 포함, 비교표 활용"
  이직: "단계별 가이드 형식, 체크리스트 포함, 경험+조언 혼합"
  회사문화: "유형별 정리 (좋은 문화 vs 나쁜 문화), 자가진단 리스트 포함"
  상사: "유형 분류 + 대처법 가이드, 심리학적 근거 살짝 언급"
  복지: "기업별 복지 비교 형식, 표나 리스트 적극 활용"
  연애: "직장인 연애 꿀팁/에피소드 모음, 부드러운 조언형"
  결혼: "현실적 정보(비용, 준비사항) + 경험담, 체크리스트 포함"
  가족: "워킹맘/워킹대디 관점, 따뜻하지만 실용적인 정보"
  재테크: "초보자 가이드 형식, 단계별 설명, 구체적 숫자와 시뮬레이션"
  직장개그: "에피소드 모음집 형태, 간결한 문장, 공감 짤방 연상"
  부동산: "시세 데이터 + 직장인 관점 분석, 지역별/가격대별 정리"
  IT: "기술 트렌드 해설 + 직장인 영향 분석, 용어 설명 포함"
  건강: "직장인 건강 가이드, 증상→원인→해결책 구조, 전문가 인용"
  정치: "팩트 체크 + 직장인 생활 영향 분석, 중립적 해설"
  자기계발: "실행 가능한 루틴 제안, 추천 리소스 포함, 단계별 접근"
  금융/경제: "경제 뉴스 해설 + 직장인 자산관리 관점, 그래프/차트 연상"
  뷰티/라이프: "제품 리뷰/추천 형태, 직장인 시간 고려한 루틴 제안"
  기타: "정보성 + 경험담 혼합, 검색 유입을 고려한 소제목 구성"

# ===================================================================
# P0-A1: 초안 포맷 정의
# ===================================================================
draft_formats:
  short:
    description: "짧은 한줄 트윗 (140자 이내)"
    max_length: 140
    instruction: "핵심 한 줄로 임팩트 있게, 이모지 1-2개 활용"
  standard:
    description: "표준 트윗 (280자 이내)"
    max_length: 280
    instruction: "도입-본문-마무리 구조로, 마지막은 질문/CTA로 끝내기"
  thread:
    description: "스레드형 3트윗"
    max_length: 840
    instruction: |
      3개의 연결된 트윗으로 구성:
      1/3: 훅 (호기심 유발, 핵심 한 줄)
      2/3: 본문 (구체적 내용, 인사이트)
      3/3: 마무리 (결론 + CTA, 질문으로 끝내기)
      각 트윗은 --- 구분선으로 분리

# ===================================================================
# P0-A1: 프롬프트 템플릿 (YAML 외부화)
# ===================================================================
prompt_templates:
  system_role: |
    당신은 직장인 대상 콘텐츠를 큐레이션하는 시니어 에디터입니다.
    [주의 사항]
    반일, 반한, 반미, 패미니스트, 남녀혐오, 세대혐오와 관련된 민감한 주제, 혐오 조장, 갈등유발 콘텐츠는 절대 다루지 마세요.
  
  twitter:
    standard: |
      [트위터(X) 초안 작성 조건]
      1. 아래 3가지 초안을 모두 작성하세요.
         - [공감형 트윗]
         - [논쟁형 트윗]
         - [정보전달형 트윗]
      2. 각 초안은 {max_length}자 이내로 작성하세요.
      3. 출처가 '{source}'임을 자연스럽게 드러내세요.
      4. 추천 초안 타입은 '{recommended_draft_type}'입니다. 이 타입은 가장 강하게 만드세요.
      5. 마지막 문장은 댓글이나 인용을 유도하는 질문 또는 한 줄 코멘트로 마무리하세요.
      6. 반드시 <twitter> 와 </twitter> 태그 안에만 작성하세요.
    thread: |
      [트위터(X) 스레드 초안 작성 조건]
      1. 3개의 연결된 트윗으로 스레드를 구성하세요.
         - 1/3: 훅 (호기심 유발하는 핵심 한 줄, 150자 이내)
         - 2/3: 본문 (구체적 내용과 인사이트, 280자 이내)
         - 3/3: 마무리 (결론 + 댓글 유도 질문, 200자 이내)
      2. 각 트윗은 --- 구분선으로 분리하세요.
      3. 출처가 '{source}'임을 1/3에서 자연스럽게 드러내세요.
      4. 3/3의 마지막은 반드시 댓글 유도 질문이나 CTA로 끝내세요.
      5. 반드시 <twitter_thread> 와 </twitter_thread> 태그 안에만 작성하세요.

  newsletter: |
    [뉴스레터 초안 작성 조건]
    1. 한 문단 요약, 인사이트, 한 줄 결론 구조로 작성하세요.
    2. 450자 이상 900자 이하로 작성하세요.
    3. 직장인 독자가 읽는다는 전제로 해석과 시사점을 덧붙이세요.
    4. 반드시 <newsletter> 와 </newsletter> 태그 안에만 작성하세요.

  threads: |
    [Threads 초안 작성 조건]
    1. 500자 이내로 작성하세요.
    2. 캐주얼하고 친구에게 말하듯 작성하세요. 존댓말보다 반말/친근체 선호.
    3. 줄바꿈을 적극 활용해 가독성을 높이세요 (한 문장당 한 줄).
    4. 공감 포인트를 먼저 던지고, 마지막에 댓글/저장을 유도하세요.
    5. 해시태그는 3개 이내로 끝에 자연스럽게 붙이세요.
    6. 이모지는 2-3개 적절히 활용하세요.
    7. 참고 톤: '{threads_tone}'
    8. 반드시 <threads> 와 </threads> 태그 안에만 작성하세요.

  naver_blog: |
    [네이버 블로그 초안 작성 조건]
    1. 1500자 이상 3000자 이하로 작성하세요.
    2. 소제목(##)을 3~4개 사용해 구조화된 글을 작성하세요.
    3. 도입(공감 유도) → 본문(사례/인사이트) → 결론(마무리+CTA) 구조를 따르세요.
    4. 검색 유입을 고려해 핵심 키워드를 자연스럽게 반복하세요.
    5. SEO 해시태그 15개를 글 끝에 추가하세요.
    6. 전문적이지만 읽기 쉬운 어조로, 표나 리스트를 활용하세요.
    7. 참고 톤: '{naver_blog_tone}'
    8. 반드시 <naver_blog> 와 </naver_blog> 태그 안에만 작성하세요.

  image_prompt: |
    [이미지 프롬프트 작성 조건]
    1. 마지막에 영어 이미지 프롬프트를 작성하세요.
    2. 텍스트 없는 장면 중심 이미지여야 합니다.
    3. 직장인 커뮤니티 상황이 한눈에 보이게 묘사하세요.
    4. 반드시 <image_prompt> 와 </image_prompt> 태그 안에만 작성하세요.

# ===================================================================
# P0-A2: 시즌 트렌드 가중치 (월별 토픽 부스트)
# ===================================================================
season_weights:
  # 각 월에 특정 토픽이 트렌딩될 확률이 높은 시기
  1:  { "연봉": 10, "재테크": 8 }            # 연말정산, 새해 재테크
  2:  { "연봉": 8, "이직": 5 }               # 연봉 협상 시즌
  3:  { "이직": 10, "회사문화": 5 }           # 인사평가 후 이직 시즌
  4:  { "이직": 8, "자기계발": 5 }            # 상반기 채용 시작
  5:  { "복지": 5, "건강": 5 }               # 가정의 달, 건강검진
  6:  { "이직": 5, "상사": 5 }               # 상반기 마무리
  7:  { "복지": 8, "건강": 5 }               # 여름 휴가, 워라밸
  8:  { "복지": 5, "직장개그": 5 }            # 여름 끝, 번아웃
  9:  { "이직": 8, "자기계발": 5 }            # 하반기 채용 시작
  10: { "이직": 5, "회사문화": 5 }            # 인사평가 준비
  11: { "연봉": 5, "회사문화": 8 }            # 연봉 협상, 인사평가
  12: { "연봉": 10, "재테크": 10, "이직": 5 } # 연말정산, 연봉 공개

# Phase 4-C: 시간대·토픽별 동적 프롬프트 변형
prompt_variants:
  # 시간대별 접두어 (KST 기준)
  time_context:
    오전:   # 06:00–11:59
      prefix: "출근 준비 중인 직장인들이 딱 공감할"
      tone_hint: "출근 전 짧게 읽히는 핵심만, 에너지 넘치게"
    점심:   # 12:00–13:59
      prefix: "점심시간 직장인들이 폰으로 읽을"
      tone_hint: "가볍고 재미있게, 5분 안에 읽히도록"
    오후:   # 14:00–17:59
      prefix: "오후 업무 중 숨돌리는 직장인들의"
      tone_hint: "공감 유발 강하게, 댓글 달고 싶게"
    저녁:   # 18:00–21:59
      prefix: "퇴근 후 소파에서 직장인들이 공감하는"
      tone_hint: "하루 풀리는 느낌, 솔직하고 따뜻하게"
    심야:   # 22:00–05:59
      prefix: "잠 못 드는 직장인들의 솔직한"
      tone_hint: "감성적이고 진솔하게, 공감의 밀도 높이게"

  # 토픽 클러스터별 훅 가이드
  topic_hooks:
    연봉:
      opener: "연봉 이야기는 언제나 직격탄"
      cta: "여러분 연봉은 어떠세요? 댓글로 알려주세요 👇"
    이직:
      opener: "이직은 배신이 아니라 생존 전략"
      cta: "지금 이직 생각 있으신 분? 저만 이런 거 아니죠?"
    회사문화:
      opener: "회사문화, 이게 맞는 건지 아직도 모르겠음"
      cta: "여러분 회사는 어떤가요? RT로 공감 표현해주세요"
    상사:
      opener: "상사 이야기는 영원히 끝나지 않는 레전드"
      cta: "비슷한 상사 있으신 분 👋 댓글로 위로해드립니다"
    복지:
      opener: "복지로 회사 수준 알 수 있음"
      cta: "여러분 회사 복지 자랑 or 욕 댓글로 공유해요"
    재테크:
      opener: "월급쟁이의 재테크, 현실은 이렇다"
      cta: "재테크 꿀팁 있으시면 댓글로 나눠주세요 🙏"
    직장개그:
      opener: "직장 생활의 웃픈 현실"
      cta: "더 웃긴 썰 있으신 분 댓글로 달아주세요 😂"
    부동산:
      opener: "집 이야기만 나오면 한숨부터 나오는 현실"
      cta: "여러분의 주거 고민은? 댓글로 나눠요 🏠"
    IT:
      opener: "개발자도 결국 직장인이다"
      cta: "IT업계 분들 공감되시나요? 댓글 남겨주세요 💻"
    건강:
      opener: "건강이 진짜 자산이라는 걸 깨달을 때"
      cta: "직장인 건강 관리 팁 있으시면 공유해주세요 🏃"
    정치:
      opener: "정치가 내 월급에 미치는 영향"
      cta: "여러분은 어떻게 생각하세요?"
    자기계발:
      opener: "퇴근 후 자기계발, 이상과 현실"
      cta: "자기계발 성공 경험 있으신 분? 댓글로 응원해주세요 📚"
    금융/경제:
      opener: "월급쟁이에게 뼈가 되고 살이 되는 금융 소식"
      cta: "이번 소식 어떻게 생각하시나요? 댓글로 의견 남겨주세요 💰"
    뷰티/라이프:
      opener: "바쁜 직장인을 위한 현실 뷰티/라이프 팁"
      cta: "나만의 관리 비법이 있다면 공유해주세요 ✨"

# ===================================================================
# P3: 소스별 분류 힌트 (source_hints)
# ===================================================================
source_hints:
  blind:
    display_name: "블라인드"
    description: "직장인 익명 커뮤니티"
    topic_bias: ["연봉", "이직", "회사문화", "상사", "복지"]
    emotion_bias: ["분노", "허탈", "현타"]
    quality_boost: 1.0  # 기본 소스이므로 boost 없음
  ppomppu:
    display_name: "뽐뿌"
    description: "쇼핑/생활정보 커뮤니티"
    topic_bias: ["재테크", "복지", "직장개그"]
    emotion_bias: ["웃김", "공감"]
    quality_boost: 0.9  # 직장 특화도 약간 낮음
  fmkorea:
    display_name: "에펨코리아"
    description: "유머/핫이슈 커뮤니티"
    topic_bias: ["직장개그", "IT", "회사문화"]
    emotion_bias: ["웃김", "경악", "공감"]
    quality_boost: 0.85  # 유머 위주라 직장 콘텐츠 정확도 낮을 수 있음
    scrape_notes: "봇 감지 주의 — rate limit 준수 필요"
  jobplanet:
    display_name: "잡플래닛"
    description: "기업 리뷰/직장인 커뮤니티"
    topic_bias: ["회사문화", "연봉", "이직", "복지", "상사"]
    emotion_bias: ["분노", "현타", "통찰"]
    quality_boost: 1.1  # 직장 특화도 높음 (리뷰 기반)
    scrape_notes: "로그인 필요 시 Cookie 관리"

# ===================================================================
# P6: Threads 전용 CTA 매핑 (감정 축 → 댓글/저장 유도 문구)
# ===================================================================
threads_cta_mapping:
  분노: "이런 경험 있으신 분? 댓글로 분풀이하세요 🔥"
  허탈: "저만 이런 거 아니죠...? 댓글로 위로해요 🥲"
  공감: "공감되면 저장 ☑️ 나중에 또 보고 싶을 거예요"
  웃김: "이거 실화냐 ㅋㅋ 더 웃긴 경험 있으면 댓글로! 😂"
