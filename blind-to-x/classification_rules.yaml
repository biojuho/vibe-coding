# ===================================================================
# P7: 플랫폼 규제 & 알고리즘 점검 시스템
# regulation_checker.py 에서 이 섹션을 로드합니다.
# 규칙 수정은 코드 배포 없이 이 파일만 편집하면 됩니다.
# ===================================================================
platform_regulations:
  x_twitter:
    display_name: "X (Twitter)"
    max_length: 280
    max_hashtags: 2  # 2026 연구: 1-2개 최적, 3개 이상 -40% 페널티

    # 최근 정책 변경 (참고용 — LLM 프롬프트에 주입)
    recent_policy_notes:
      - "외부 링크 본문 포함 시 30-50% 도달 감소 — 반드시 답글(reply)에 분리"
      - "해시태그 3개 이상 시 -40% 페널티, 1-2개만 사용"
      - "텍스트 전용 포스트가 이미지보다 37%, 영상보다 30% 높은 참여율 (X만의 특성)"
      - "첫 30-60분 참여 속도(velocity)가 알고리즘 노출의 핵심 결정 요소"
      - "답글+저자응답 = 150배 가중치 (가장 강력한 시그널)"
      - "인용RT = 25배, RT = 20배, 답글 = 13.5배, 북마크 = 10배, Like = 1배"
      - "Premium 계정은 4-8배 배포 부스트"

    # 페널티 유발 요소 (검증 시 구체적 체크)
    penalty_triggers:
      - "본문에 외부 링크 포함 (30-50% 도달 감소)"
      - "해시태그 3개 이상 (-40% 페널티)"
      - "동일 문구 반복 게시 (24시간 내 3회 이상)"
      - "10분 이내 연속 게시 (스팸 감지)"
      - "engagement farming ('like하면 OO', '공감하면 RT')"
      - "shadowban 트리거: 과도한 해시태그, 정치적 극단 키워드"

    # 금지어 / 위험 패턴 (validate 시 체크)
    penalty_words: []
    # 링크 패턴 감지 (본문에 있으면 경고)
    link_patterns: ["http://", "https://", "bit.ly", "t.co"]

    # 알고리즘이 우대하는 콘텐츠 특성
    algorithm_favors:
      - "텍스트 전용 포스트 (X에서는 미디어보다 텍스트가 우월)"
      - "답글이 활발한 논의형 콘텐츠 (답글+응답 = 150x)"
      - "북마크를 유도하는 정보성 콘텐츠 (10x)"
      - "71-100자 최적 참여율 (+17%), 240-259자 최적 좋아요"
      - "구체적 선택형 CTA 질문 (답글 유도)"
      - "링크는 첫 번째 답글(reply)에 분리"
      - "스레드 형식으로 체류 시간 확보 (10x)"

    # 링크-인-리플라이 전략
    link_in_reply:
      enabled: true
      format: "원문: {url}\n#{hashtag1} #{hashtag2}"
      reason: "본문 링크 페널티 회피 + 해시태그 분리로 가독성 향상"

    do_checklist:
      - "본문은 텍스트 중심으로 작성하세요 (X에서 텍스트가 최고 성과)"
      - "71-100자 또는 240-259자 범위를 목표로 하세요"
      - "구체적 선택형 질문으로 답글을 유도하세요 (150x 가중치)"
      - "링크와 해시태그는 첫 번째 답글(reply)에 분리하세요"
      - "해시태그는 1-2개만 사용하세요"
      - "인용RT하기 좋은 독립적 인사이트를 포함하세요"

    dont_checklist:
      - "본문에 외부 링크를 넣지 마세요 (답글에 분리)"
      - "해시태그를 3개 이상 사용하지 마세요 (-40% 페널티)"
      - "같은 내용을 10분 이내에 연속 게시하지 마세요"
      - "'공감하면 RT', 'like하면 OO' 등 engagement farming 금지"
      - "'여러분의 생각은?' 같은 막연한 CTA 금지 — 구체적 선택지 제시"

    # 최적 게시 시간 (KST 기준)
    optimal_posting:
      best_days: ["화", "수", "목"]
      best_windows_kst: ["08:00-10:00", "12:00-13:00", "19:00-21:00"]
      peak: "수요일 09:00 KST"
      frequency: "하루 2-3개, 포스트 간 30-60분 간격"
      velocity_window: "첫 30-60분이 알고리즘 결정"

  threads:
    display_name: "Threads"
    max_length: 500
    max_hashtags: 5

    recent_policy_notes:
      - "외부 링크 게시물의 추천 피드 노출 제한"
      - "텍스트 전용 포스트의 가시성 하락"
      - "초기 30분 내 참여율(Early engagement)이 핵심 지표"

    penalty_triggers:
      - "외부 링크 포함 시 추천 피드에서 제외"
      - "스팸성 반복 해시태그"
      - "상업적 CTA 과다"
      - "봇성 반복 게시 패턴"

    commercial_cta_words: ["구매", "할인", "프로모션", "쿠폰", "광고", "협찬", "링크 클릭"]

    algorithm_favors:
      - "원본 이미지/비디오 포함"
      - "댓글이 활발한 게시물"
      - "초기 30분 내 참여율 (Early engagement)"
      - "진정성 있는 대화체 톤"
      - "짧은 스토리텔링 + 질문형 마무리"

    do_checklist:
      - "원본 이미지를 최소 1장 포함하세요"
      - "캐주얼한 대화체 톤을 유지하세요"
      - "질문형 CTA로 댓글을 유도하세요"
      - "줄바꿈을 활용해 가독성을 높이세요"

    dont_checklist:
      - "외부 링크를 본문에 넣지 마세요 (댓글로 분리)"
      - "상업적 톤(구매, 할인 등)을 사용하지 마세요"
      - "해시태그 5개 초과 사용하지 마세요"
      - "다른 플랫폼과 동일한 내용을 그대로 올리지 마세요"

  naver_blog:
    display_name: "네이버 블로그"
    min_length: 1500
    min_subheadings: 3
    min_seo_tags: 10
    max_keyword_repeat: 10

    recent_policy_notes:
      - "C-Rank 2.0 — 주제 일관성 가중치 강화"
      - "D.I.A. 알고리즘에 사용자 체류 시간 반영 비중 증가"
      - "저품질 판정 기준: 500자 미만, 키워드 도배, 타 블로그 복사"

    penalty_triggers:
      - "저품질 판정: 짧은 글(500자 미만), 키워드 도배"
      - "타 블로그 내용 복사/유사도 높은 글"
      - "과도한 어뷰징 키워드 삽입"
      - "주제와 무관한 태그 사용"

    algorithm_favors:
      - "주제 일관성 (C-Rank): 하나의 주제에 깊게"
      - "충분한 글 길이 (1,500자 이상)"
      - "이미지 3~5장 적정 배치"
      - "독자 체류 시간이 긴 콘텐츠"
      - "소제목(##) 활용한 구조화된 글"

    do_checklist:
      - "소제목(##)을 3~5개로 구조화하세요"
      - "본문 1,500자 이상 유지하세요"
      - "SEO 태그 10~15개를 포함하세요"
      - "이미지 3~5장을 중간중간 배치하세요"
      - "검색 키워드를 자연스럽게 포함하세요"

    dont_checklist:
      - "키워드 반복 도배를 하지 마세요"
      - "외부 복사 텍스트를 사용하지 마세요"
      - "500자 미만 짧은 글을 업로드하지 마세요"
      - "주제와 무관한 태그를 사용하지 마세요"
      - "동일 주제로 하루에 여러 글을 올리지 마세요"

# ===================================================================
# 크로스소스 인사이트 설정
# cross_source_insight.py 에서 이 섹션을 로드합니다.
# ===================================================================
cross_source_insight:
  enabled: true
  min_posts: 3
  min_sources: 2

# ===================================================================
# 실시간 트렌드 모니터링 설정
# trend_monitor.py 에서 이 섹션을 로드합니다.
# ===================================================================
trends:
  enabled: true
  google_enabled: true
  naver_enabled: true
  spike_threshold: 80.0
  cache_ttl_minutes: 10
  # topic_cluster와 매핑되는 트렌드 검색 키워드
  topic_keywords:
    연봉: ["직장인 연봉", "연봉 인상", "성과급"]
    이직: ["이직", "퇴사", "면접"]
    회사문화: ["직장 문화", "야근", "워라밸"]
    상사: ["직장 상사", "팀장"]
    복지: ["직장 복지", "재택근무"]
    재테크: ["주식", "부동산", "재테크"]
    IT: ["개발자", "AI", "코딩"]
    부동산: ["아파트", "전세", "청약"]
    건강: ["직장인 건강", "번아웃"]
    자기계발: ["자격증", "사이드프로젝트"]
    연애: ["연애", "소개팅", "결혼"]
    결혼: ["결혼", "신혼", "이혼"]
    가족: ["가족", "육아", "부모"]
    직장개그: ["직장 유머", "직장 밈", "직장 웃긴"]
    정치: ["정치", "대통령", "선거"]
    금융/경제: ["금리", "환율", "물가"]
    뷰티/라이프: ["뷰티", "라이프스타일", "패션"]

# ===================================================================
# 브랜드 보이스 (Brand Voice)
# editorial_reviewer.py, draft_generator.py 에서 이 섹션을 로드합니다.
# ===================================================================
brand_voice:
  persona: "30대 직장인이 퇴근 후 친구에게 톡하듯 쓰는 말투"
  voice_traits:
    - "~요 체 사용 (반말X, 격식체X)"
    - "구어체 적극 사용 (근데, 진짜, 솔직히, 아니, 와)"
    - "숫자/팩트를 쓸 때 반드시 해석을 곁들임 ('연봉 5천' → '연봉 5천이면 세후 350쯤인데')"
    - "마무리는 독자에게 질문 or 한줄 코멘트"
    - "핵심을 먼저 던지고, 맥락은 뒤에"
    - "이모지는 1~2개만, 포인트로 사용"
  forbidden_expressions:
    # AI 블로그체 (사람은 절대 이렇게 안 씀)
    - "오늘은 ~에 대해 이야기해보겠습니다"
    - "이상으로 마치겠습니다"
    - "~에 대해 알아보겠습니다"
    - "~라고 할 수 있겠네요"
    - "~적인 측면에서 보면"
    - "~하는 것이 중요합니다"
    # 주의: "많은 분들이", "여러분도 한번", "그렇다면" 등은
    # 실제 사람도 쓰므로 금지 대상에서 제외 (과도한 제약은 부자연스러움 유발)
  examples:
    good: "블라인드에서 연봉 5천 자랑글 밑에 달린 댓글이 레전드... '저는 5천이 월급인데요' 🥲"
    bad: "많은 직장인들이 연봉에 대해 고민하고 있습니다. 오늘은 연봉 이야기를 해보겠습니다."

# ===================================================================
# 클리셰 감시 목록 (Cliche Watchlist)
# draft_quality_gate.py 에서 이 섹션을 로드합니다.
# 3개 이상 매치 시 warning 발생.
# ===================================================================
cliche_watchlist:
  # SNS 상투적 오프닝 (실제 사람도 쓰는 "이거 실화?", "나만 이런 거 아니죠?"는 허용)
  - "다들 공감하실"
  - "직장인이라면 공감"
  - "직장인이라면 한 번쯤"
  - "~해본 사람 손"
  # engagement farming (X 알고리즘 페널티)
  - "공감하면 RT"
  - "공감 누르고 가세요"
  # AI스러운 표현 (사람은 절대 이렇게 안 씀)
  - "흥미로운 점은"
  - "결론적으로"
  - "주목할 만한"
  - "시사하는 바가"
  - "살펴보면"
  - "알아보겠습니다"
  - "중요한 것은"
  - "눈여겨볼 점은"
  # 무의미한 수식
  - "진정한 의미의"
  - "새로운 시대의"
  - "변화의 바람이"
  - "핵심은 바로"

# ===================================================================
# P0-2: Chain-of-Thought 사고 과정 프레임워크
# draft_generator.py 의 _build_prompt() 에서 로드합니다.
# ===================================================================
# prompt_templates.thinking_framework 에 추가
# (prompt_templates 섹션은 위에 이미 존재하므로, 아래에 별도 키로 정의)

# ===================================================================
# P1-1: 토픽별 프롬프트 전략 (Topic Prompt Strategies)
# draft_generator.py 의 _build_prompt() 에서 로드합니다.
# ===================================================================
topic_prompt_strategies:
  연봉:
    emphasis: "구체적 숫자를 최대한 활용. 세전/세후 환산, 업계 비교 등 팩트 기반으로 작성."
    avoid: "막연한 '높은 연봉' 표현. 반드시 구체적 금액을 명시."
    hook_template: "[숫자] + [반전/비교]"
    example_structure: "숫자 훅 → 현실 비교 → 인사이트 → CTA"
  이직:
    emphasis: "결단의 순간, 감정 변화, 실전 경험. '용기'보다 '현실'에 초점."
    avoid: "무조건적 응원. 구체적 상황과 현실적 조언을 포함할 것."
    hook_template: "[감정/상황] + [인사이트]"
    example_structure: "공감 → 구체적 경험 → 교훈 → CTA"
  회사문화:
    emphasis: "누구나 겪는 상황을 구체적 에피소드로 보여주기. '맞아맞아' 반응 유발."
    avoid: "추상적 문화 비평. 구체적 장면/대화로 보여줄 것."
    hook_template: "[구체적 상황] + [공감 포인트]"
    example_structure: "에피소드 → 공감 → 한줄 코멘트 → CTA"
  상사:
    emphasis: "위트와 풍자로 같이 웃으면서 공감. 실제 대화/상황 재현."
    avoid: "단순 불평. 웃기거나 공감되는 구체적 에피소드로 풀 것."
    hook_template: "[실제 대화 재현] + [반전/코멘트]"
    example_structure: "상황 설정 → 상사 발언 재현 → 반전/코멘트"
  복지:
    emphasis: "비교 관점 제시. '우리 회사는 이런데 다른 회사는 저렇다' 구조."
    avoid: "단순 나열. 비교와 해석을 곁들일 것."
    hook_template: "[비교 대상] + [격차 강조]"
    example_structure: "복지 사례 → 비교 → 인사이트 → 질문"
  연애:
    emphasis: "친구에게 말하듯 다정하고 공감 강한 톤. 디테일한 상황 묘사."
    avoid: "조언체. 경험담과 공감 중심으로."
    hook_template: "[상황 묘사] + [감정]"
    example_structure: "상황 → 감정 → 공감 → 질문"
  결혼:
    emphasis: "담백하지만 울림. 현실적 조언과 경험담 혼합."
    avoid: "이상적 결혼관 강요. 현실 기반으로."
    hook_template: "[현실 에피소드] + [교훈]"
    example_structure: "에피소드 → 현실 인사이트 → 마무리"
  가족:
    emphasis: "따뜻하지만 현실적인 톤. 구체적 대화/상황 재현."
    avoid: "감성 과잉. 사실적 묘사로."
    hook_template: "[가족 대화/상황] + [감정]"
    example_structure: "상황 → 감정 → 인사이트 → CTA"
  재테크:
    emphasis: "구체적 숫자와 실전 경험 중심. 계산/시뮬레이션 포함 시 강력."
    avoid: "막연한 '투자하세요' 조언. 구체적 금액/수익률/기간 명시."
    hook_template: "[구체적 금액/수익] + [현실 해석]"
    example_structure: "숫자 훅 → 실전 경험 → 교훈 → CTA"
  직장개그:
    emphasis: "타이밍과 반전이 생명. 짧은 문장, 줄바꿈으로 펀치라인 강조."
    avoid: "설명적인 문장. 웃긴 포인트를 설명하지 말고 보여줄 것."
    hook_template: "[상황 설정] → [반전]"
    example_structure: "상황 → 반전 → 한 줄 코멘트"
  부동산:
    emphasis: "현실 공감 + 구체적 데이터. 직장인 시각에서 해석."
    avoid: "부동산 전문가 톤. 직장인의 한숨/현실로 접근."
    hook_template: "[구체적 금액/상황] + [직장인 해석]"
    example_structure: "현실 → 데이터 → 직장인 시각 → CTA"
  IT:
    emphasis: "기술 트렌드를 직장인 언어로 번역. 개발자 유머 활용."
    avoid: "기술 용어 나열. 직장인이 이해할 수 있게 풀어쓸 것."
    hook_template: "[기술 트렌드] + [직장인 영향]"
    example_structure: "트렌드 → 직장인 해석 → 유머/공감 → CTA"
  건강:
    emphasis: "걱정되지만 가볍게 접근. 실천 가능한 작은 팁 포함."
    avoid: "의학 전문 용어. 공감 + 작은 실천으로."
    hook_template: "[증상/상황] + [공감]"
    example_structure: "상황 → 공감 → 작은 팁 → CTA"
  정치:
    emphasis: "중립적이고 팩트 중심. 직장인 생활에 미치는 영향으로 해석."
    avoid: "정치적 편향. 팩트 기반 + 직장인 생활 영향만."
    hook_template: "[팩트] + [직장인 영향]"
    example_structure: "팩트 → 직장인 해석 → 중립적 질문"
  자기계발:
    emphasis: "이상과 현실 사이의 솔직한 톤. '하고 싶은데 못하겠어' 공감."
    avoid: "동기부여 강요. 현실적 공감 우선."
    hook_template: "[이상 vs 현실] + [공감]"
    example_structure: "이상 → 현실 → 작은 성공담 → CTA"
  금융/경제:
    emphasis: "월급쟁이 시각으로 경제 뉴스 해석. 핵심만 짧게."
    avoid: "경제 전문가 톤. 내 월급/생활에 어떤 영향인지 중심."
    hook_template: "[경제 팩트] + [월급쟁이 해석]"
    example_structure: "뉴스 → 내 지갑 영향 → 인사이트 → CTA"
  뷰티/라이프:
    emphasis: "트렌디하고 실용적. 바쁜 직장인을 위한 현실 가능한 팁."
    avoid: "인플루언서 톤. 직장인 시간/예산 고려."
    hook_template: "[직장인 상황] + [꿀팁]"
    example_structure: "상황 → 꿀팁 → 추천 → CTA"

# ===================================================================
# P1-2: 나쁜 예시 (Anti-Examples)
# draft_generator.py 의 _format_examples() 에서 로드합니다.
# ===================================================================
anti_examples:
  generic_bad:
    - text: "많은 직장인들이 연봉에 대해 고민하고 있습니다. 오늘은 연봉 이야기를 해보겠습니다. 연봉은 중요한 문제인데요, 여러분도 한번 생각해보세요."
      reason: "상투적 오프닝 3개 연속, AI스러운 어투, 구체성 제로, 금지 표현 사용"
    - text: "이직에 대해 알아보겠습니다. 최근 많은 사람들이 이직을 고려하고 있습니다. 이직은 신중하게 결정해야 하는 중요한 문제입니다."
      reason: "뉴스 기사체, 구체적 경험 없음, 누구나 아는 뻔한 내용, '~에 대해 알아보겠습니다' 금지 표현"
    - text: "직장 생활에서 중요한 것은 바로 소통입니다. 소통이 잘 되는 회사와 그렇지 않은 회사의 차이는 매우 큽니다. 여러분의 생각은 어떠신가요?"
      reason: "추상적 주제, 구체적 에피소드 없음, '핵심은 바로' + '여러분의 생각은' 클리셰"

# ===================================================================
# P1-3: 동적 에디토리얼 임계값 (Dynamic Editorial Thresholds)
# editorial_reviewer.py 에서 이 섹션을 로드합니다.
# ===================================================================
editorial_thresholds:
  defaults:
    twitter: 6.5
    threads: 6.0
    naver_blog: 7.0
    newsletter: 6.0
  topic_overrides:
    연봉:
      twitter: 7.0
      naver_blog: 7.5
    재테크:
      twitter: 7.0
      naver_blog: 7.5
    이직:
      twitter: 6.5
    직장개그:
      twitter: 5.5
      threads: 5.5
    IT:
      naver_blog: 7.0
