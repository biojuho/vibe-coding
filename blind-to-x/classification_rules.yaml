# blind-to-x 콘텐츠 분류 규칙
# content_intelligence.py 에서 이 파일을 로드합니다.
# 규칙 수정은 코드 배포 없이 이 파일만 편집하면 됩니다.

topic_rules:
  - label: "연봉"
    keywords: ["연봉", "월급", "성과급", "보너스", "급여", "임금", "인상"]
  - label: "이직"
    keywords: ["이직", "퇴사", "취업", "면접", "채용", "오퍼", "커리어"]
  - label: "회사문화"
    keywords: ["회사", "조직", "문화", "팀장", "상사", "팀원", "평가", "인사"]
  - label: "상사"
    keywords: ["상사", "부장", "팀장", "임원", "매니저", "관리자"]
  - label: "복지"
    keywords: ["복지", "재택", "휴가", "워라밸", "식대", "지원금", "사내"]
  - label: "연애"
    keywords: ["연애", "소개팅", "썸", "남친", "여친", "플러팅"]
  - label: "결혼"
    keywords: ["결혼", "신혼", "배우자", "남편", "아내", "이혼"]
  - label: "가족"
    keywords: ["가족", "부모", "엄마", "아빠", "자녀", "육아"]
  - label: "재테크"
    keywords: ["주식", "코인", "재테크", "부동산", "투자", "대출"]
  - label: "직장개그"
    keywords: ["웃김", "개웃", "현웃", "짤", "썰", "실화", "밈"]
  # P0-A2: 토픽 확장 (10→15개)
  - label: "부동산"
    keywords: ["아파트", "전세", "월세", "청약", "집값", "매매", "분양"]
  - label: "IT"
    keywords: ["개발자", "코딩", "AI", "GPT", "프로그래밍", "서버", "데이터"]
  - label: "건강"
    keywords: ["운동", "건강", "헬스", "다이어트", "병원", "수면", "스트레스"]
  - label: "정치"
    keywords: ["정치", "대통령", "국회", "선거", "정당", "법안", "규제"]
  - label: "자기계발"
    keywords: ["공부", "자격증", "영어", "독서", "사이드프로젝트", "성장", "MBA"]
  - label: "금융/경제"
    keywords: ["금리", "주식", "경제", "투자", "환율", "대출", "물가"]
  - label: "뷰티/라이프"
    keywords: ["뷰티", "화장품", "라이프스타일", "피부", "미용", "패션", "관리"]

emotion_rules:
  - label: "분노"
    keywords: ["빡", "열받", "화나", "분노", "짜증", "억까"]
  - label: "허탈"
    keywords: ["허탈", "허무", "현타", "공허", "멘붕"]
  - label: "공감"
    keywords: ["공감", "이해", "맞말", "다들", "나만", "저만"]
  - label: "웃김"
    keywords: ["웃김", "개웃", "현웃", "웃겨", "유머", "짤"]
  - label: "경악"
    keywords: ["충격", "미쳤", "실화", "레전드", "소름"]
  - label: "현타"
    keywords: ["현타", "퇴사 마렵", "현실", "지친", "번아웃"]
  - label: "통찰"
    keywords: ["인사이트", "배운", "느낀", "교훈", "정리"]
  # P0-A2: 감정 축 확장 (7→10개)
  - label: "자부심"
    keywords: ["자랑", "뿌듯", "성취", "해냈", "인정받", "칭찬"]
  - label: "불안"
    keywords: ["불안", "걱정", "두렵", "막막", "앞이 안 보", "어떡하지"]
  - label: "기대감"
    keywords: ["기대", "설레", "드디어", "곧", "기다", "두근"]

audience_rules:
  - label: "초년생"
    keywords: ["신입", "주니어", "첫회사", "사회초년생"]
  - label: "이직준비층"
    keywords: ["이직", "오퍼", "면접", "취준", "구직"]
  - label: "관리자층"
    keywords: ["팀장", "리더", "매니저", "임원", "관리자"]
  - label: "전직장인"
    keywords: ["회사", "직장", "출근", "퇴근", "상사", "팀원"]

hook_rules:
  논쟁형:
    keywords: ["왜", "vs", "맞아?", "어떰", "어떻게 생각", "논란", "?"]
  정보형:
    keywords: ["정리", "팁", "방법", "요약", "가이드", "체크리스트"]
  짤형:
    keywords: ["짤", "웃김", "현웃", "개웃", "밈"]
  분석형:
    keywords: ["분석", "트렌드", "비교", "종합", "모아봤", "정리해봤", "동시에", "커뮤니티"]
  통찰형:
    keywords: ["배운", "깨달", "인사이트", "알게 된", "정리하면", "느낀 점", "교훈", "결론"]
  한줄팩폭형:
    keywords: ["ㅋㅋ", "레전드", "개웃", "이건 진짜", "실화냐", "미쳤", "헐"]
  # 나머지는 공감형 (default)

# ===================================================================
# P0-A1: 골든 예시 (토픽별 S/A등급 트윗 레퍼런스)
# ===================================================================
golden_examples:
  연봉:
    - text: "블라인드에서 연봉 5천 자랑글 밑에 달린 댓글이 레전드... '저는 5천이 월급인데요' 🥲 직장인 세계는 넓고 연봉은 다양하다"
      grade: "S"
      hook_type: "공감형"
    - text: "성과급 0% 통보받고 팀장이 '내년에 잘하자'래요. 내년에 여기 있을 거 같아요? 😂"
      grade: "A"
      hook_type: "논쟁형"
    - text: "연봉 7천인데 세후 450 찍히는 거 보고 현타 옴. 세금이 내 두 번째 상사임"
      grade: "A"
      hook_type: "짤형"
    - text: "동기가 이직해서 2천 올렸대. 나는 3년 있으면서 500 올랐는데. 충성의 가격이 이거임?"
      grade: "S"
      hook_type: "논쟁형"
    - text: "연봉 협상에서 '시장 상황이 어려워서'라는 말 들을 때마다 궁금함. 그럼 실적 좋을 때는 왜 안 올려줬는지"
      grade: "A"
      hook_type: "통찰형"
  이직:
    - text: "면접 5번 보고 최종 합격했는데 현 회사 카운터오퍼가 더 높음. 이직의 진짜 가치는 '내 몸값 확인'이었다"
      grade: "S"
      hook_type: "통찰형"
    - text: "퇴사 결심하니까 갑자기 다 보여요. 회사가 나를 얼마나 신경 안 썼는지..."
      grade: "A"
      hook_type: "공감형"
    - text: "3년차에 퇴사하니까 '아쉽다' 하던 팀장이 다음 날 바로 채용공고 올림. 회사에서 대체불가능한 사람은 없다 진짜"
      grade: "S"
      hook_type: "짤형"
    - text: "이직 준비하면서 배운 거: 현 회사 연봉이 낮은 게 아니라 내 기대가 높은 건지, 시장이 날 어떻게 보는지"
      grade: "A"
      hook_type: "통찰형"
    - text: "퇴사 전날 인수인계하는데 아무도 안 물어봄. 아 이거 내가 없어도 돌아가는 회사였구나"
      grade: "A"
      hook_type: "공감형"
  회사문화:
    - text: "회의 시작 5분 전에 '이거 검토해봐' 던지는 문화... 대한민국 직장의 시간 개념은 상사 기준입니다"
      grade: "S"
      hook_type: "논쟁형"
    - text: "야근이 능력인 줄 아는 회사 vs 칼퇴가 당연한 회사. 같은 연봉이면 뭘 고르실?"
      grade: "A"
      hook_type: "논쟁형"
    - text: "'자유로운 분위기'라고 채용공고에 써놓고 실제로는 점심 메뉴도 팀장이 정하는 회사"
      grade: "A"
      hook_type: "짤형"
    - text: "우리 회사 신기한 게 회의는 30분인데 회의 전 대기가 20분임. 그 20분이 진짜 근무시간 아닌가"
      grade: "A"
      hook_type: "공감형"
  상사:
    - text: "팀장님이 '우리 팀은 수평적이야'라고 하셨는데 그 말 끝나기도 전에 '야, 이거 다시 해와' 🙃"
      grade: "S"
      hook_type: "짤형"
    - text: "상사가 '편하게 말해'라고 해서 편하게 말했더니 인사평가에 '태도 개선 필요' 적힘"
      grade: "A"
      hook_type: "짤형"
    - text: "팀장이 '나 때는' 시작하면 평균 17분 걸림. 측정해봤음"
      grade: "S"
      hook_type: "짤형"
  복지:
    - text: "자유 연차 쓴다고 했더니 '이유가 뭔데?'라고 묻는 회사... 자유의 정의를 다시 생각하게 됩니다"
      grade: "A"
      hook_type: "공감형"
    - text: "재택근무 폐지 공지 뜬 날 사내 게시판 댓글 200개 달림. 회사 역사상 최다 참여"
      grade: "A"
      hook_type: "짤형"
    - text: "복지포인트 40만원 vs 금요일 4시 퇴근. 진심으로 뭐가 더 나음?"
      grade: "S"
      hook_type: "논쟁형"
  재테크:
    - text: "월급의 40%가 고정비로 빠지는데 재테크를 하라고? 먼저 생존테크 좀 하겠습니다 🙏"
      grade: "A"
      hook_type: "공감형"
    - text: "주식으로 300 벌었다고 자랑했는데 수수료+세금 빼니까 실수령 218임. 국세청이 내 파트너였음"
      grade: "A"
      hook_type: "짤형"
    - text: "적금 만기 됐는데 이자가 치킨 2마리 값임. 1년을 참은 보상이 이거"
      grade: "S"
      hook_type: "공감형"
  직장개그:
    - text: "월요일 아침 팀 회의에서 '다들 주말 잘 보냈어요?'라는 질문에 진심으로 대답하면 분위기 이상해지는 직장생활"
      grade: "S"
      hook_type: "짤형"
    - text: "회식에서 2차 가자는 부장님한테 '내일 아침 일찍 출근해야 해서요'라고 했더니 '나도 같이 출근하잖아' 들어옴. 반박불가"
      grade: "S"
      hook_type: "짤형"
    - text: "점심시간 1시간인데 엘리베이터 대기 15분, 식당 줄 10분, 먹는 시간 20분. 실제 쉬는 시간 15분. 이게 휴식이냐"
      grade: "A"
      hook_type: "공감형"
  부동산:
    - text: "전세 만기 다가오는데 집주인이 5천 올리겠다고... 직장인에게 전세 만기는 두 번째 퇴사 통보입니다"
      grade: "A"
      hook_type: "공감형"
    - text: "월세 70 내고 살다가 전세로 갈아탔는데 대출이자가 월 65임. 뭐가 달라진 건지 모르겠음"
      grade: "A"
      hook_type: "짤형"
    - text: "청약 넣었다가 떨어짐. 8번째. 로또보다 확률 낮은 거 아님?"
      grade: "A"
      hook_type: "공감형"
  IT:
    - text: "개발자 연봉이 높다길래 코딩 배웠는데, 진짜 높은 건 야근 시간이었습니다"
      grade: "A"
      hook_type: "짤형"
    - text: "GPT한테 코드 리뷰 받았는데 내 3년차 코드에 '초보자 수준'이라고 나옴. AI도 솔직하네"
      grade: "S"
      hook_type: "짤형"
    - text: "스타트업 CTO가 '우린 기술 부채 없어'라고 하면 99% 기술 부채를 모르는 거임"
      grade: "A"
      hook_type: "통찰형"
  건강:
    - text: "직장인 건강검진 결과를 받아봤는데... 나이보다 회사가 더 나를 늙게 만들고 있었다"
      grade: "A"
      hook_type: "공감형"
    - text: "허리 아파서 병원 갔더니 의사가 '직업이 뭐세요?' 물어봄. 사무직이라고 했더니 한숨 쉼"
      grade: "A"
      hook_type: "짤형"
    - text: "번아웃 와서 하루 쉬었는데 다음 날 출근하니까 밀린 일이 이틀치임. 쉬는 게 더 피곤"
      grade: "S"
      hook_type: "공감형"
  자기계발:
    - text: "퇴근 후에 공부하라는 말은 쉽죠. 해보신 분? 침대가 이기는 비율 99.7%"
      grade: "A"
      hook_type: "짤형"
    - text: "자격증 3개 땄는데 연봉은 그대로. 스펙의 가치는 이직할 때만 존재한다는 걸 3년 만에 깨달음"
      grade: "A"
      hook_type: "통찰형"
    - text: "사이드 프로젝트 한다고 3개월 야근했는데 결과물: 깃허브 커밋 47개와 다크서클"
      grade: "A"
      hook_type: "짤형"
  분석형:
    - text: "이번 주 블라인드·뽐뿌·잡플래닛에서 동시에 터진 주제: 연봉 인상률. 블라인드에선 '3% 미만은 모욕', 뽐뿌에선 '물가 상승률도 못 따라가', 잡플래닛에선 '리뷰로 확인한 연봉 현실'. 3개 커뮤니티가 같은 말을 하고 있다면, 그건 이미 트렌드입니다."
      grade: "S"
      hook_type: "분석형"
    - text: "4개 직장인 커뮤니티에서 이번 주 공통 키워드: '퇴사'. 블라인드는 연봉 불만, 에펨코리아는 상사 밈, 잡플래닛은 기업 리뷰 폭증. 직장인의 불만이 동시다발적으로 터질 때, 그건 개인의 문제가 아닙니다."
      grade: "A"
      hook_type: "분석형"

# ===================================================================
# P6: Threads 전용 골든 예시 (캐주얼 톤, 500자 이내, 해시태그 3개)
# ===================================================================
golden_examples_threads:
  연봉:
    - text: |
        블라인드에서 연봉 5천 자랑글에 달린 댓글 봤어요?
        '저는 5천이 월급인데요' 🥲
        직장인 세계는 넓고 연봉은 다양하다...
        여러분은 연봉에 만족하시나요? 솔직히 댓글로 알려주세요 👇
        #연봉 #직장인 #현실
      grade: "S"
    - text: |
        성과급 0% 통보받고 팀장이 '내년에 잘하자'래요.
        내년에 여기 있을 거 같아요? 😂
        이거 저만 그런 거 아니죠...?
        #성과급 #직장인현실 #이직
      grade: "A"
  이직:
    - text: |
        면접 5번 보고 최종 합격했는데
        현 회사 카운터오퍼가 더 높음.
        이직의 진짜 가치는 '내 몸값 확인'이었다는 사실.
        이직은 배신이 아니라 생존이에요 🙌
        #이직 #카운터오퍼 #자기가치
      grade: "S"
  회사문화:
    - text: |
        회의 5분 전에 '이거 검토해봐' 던지는 건 진짜 국룰이죠?
        대한민국 직장의 시간 개념 = 상사 기준
        공감되시면 저장해두세요 ☑️
        #회사문화 #직장인 #공감
      grade: "S"
  직장개그:
    - text: |
        월요일 아침 팀 회의에서
        '다들 주말 잘 보냈어요?'
