draft_formats:
  short:
    description: "짧은 한줄 트윗 (140자 이내)"
    max_length: 140
    instruction: "핵심 한 줄로 임팩트 있게, 이모지 1-2개 활용"
  standard:
    description: "표준 트윗 (280자 이내)"
    max_length: 280
    instruction: "도입-본문-마무리 구조로, 마지막은 질문/CTA로 끝내기"
  thread:
    description: "스레드형 3트윗"
    max_length: 840
    instruction: |
      3개의 연결된 트윗으로 구성:
      1/3: 훅 (호기심 유발, 핵심 한 줄)
      2/3: 본문 (구체적 내용, 인사이트)
      3/3: 마무리 (결론 + CTA, 질문으로 끝내기)
      각 트윗은 --- 구분선으로 분리

# ===================================================================
# P0-A1: 프롬프트 템플릿 (YAML 외부화)
# ===================================================================
prompt_templates:
  system_role: |
    당신은 직장인 대상 콘텐츠를 큐레이션하는 시니어 에디터입니다.
    [주의 사항]
    반일, 반한, 반미, 패미니스트, 남녀혐오, 세대혐오와 관련된 민감한 주제, 혐오 조장, 갈등유발 콘텐츠는 절대 다루지 마세요.

  twitter:
    standard: |
      [트위터(X) 초안 — 편집 없이 바로 게시할 수 있게]

      당신은 30대 직장인이 퇴근 후 친구에게 카톡하듯 글을 씁니다.
      원문을 읽고, 직장인 친구에게 이 이야기를 전해주세요.
      AI가 쓴 티가 나면 실패입니다. 사람이 실제로 치는 톡처럼 써야 합니다.

      [금지 — 이것만 지키세요]
      - 본문에 링크/해시태그 넣지 마세요 (답글에 분리)
      - "여러분 생각은?", "공감하면 RT", "알아보겠습니다" 같은 상투적 표현 금지
      - 원문에 없는 숫자/사실 날조 금지

      [자유롭게 — 구조에 얽매이지 마세요]
      - 짧은 한 줄이어도 좋고, 3-4줄이어도 좋습니다 ({max_length}자 이내)
      - 훅으로 시작해도, 에피소드로 시작해도, 질문으로 시작해도 됩니다
      - 원문의 가장 재밌거나 충격적인 부분을 살려주세요
      - 끝은 답글이 달리게 — 구체적 선택지("A vs B?")나 공감 유도가 좋습니다
      - 출처 '{source}'를 자연스럽게 녹이세요 ("블라인드에서 봤는데", "블라인드 레전드")

      [작성할 것]
      1. 3가지 초안 (각각 다른 톤): 공감형, 논쟁형, 정보전달형
         - 추천: '{recommended_draft_type}' — 이 타입을 가장 강하게
      2. 반드시 <twitter> 와 </twitter> 태그 안에만 작성
      3. 답글 텍스트도 <reply> 와 </reply> 태그 안에 작성 (원문 링크 + 해시태그 1-2개)
    thread: |
      [트위터(X) 스레드 초안 작성 조건]

      ★ X 알고리즘 핵심: 스레드는 체류 시간 10배 부스트!
      - 본문에 링크/해시태그 절대 금지 (답글에 분리)

      1. 3개의 연결된 트윗으로 스레드를 구성하세요.
         - 1/3: 훅 (호기심 유발하는 핵심 한 줄, 150자 이내)
         - 2/3: 본문 (구체적 내용과 인사이트, 280자 이내)
         - 3/3: 마무리 (결론 + 구체적 선택형 CTA, 200자 이내)
      2. 각 트윗은 --- 구분선으로 분리하세요.
      3. 출처가 '{source}'임을 1/3에서 자연스럽게 드러내세요.
      4. 3/3의 마지막은 반드시 구체적 선택형 질문으로 끝내세요.
      5. 반드시 <twitter_thread> 와 </twitter_thread> 태그 안에만 작성하세요.

      ★ 답글(Reply) 텍스트도 작성:
      - 반드시 <reply> 와 </reply> 태그 안에 원문 링크 + 해시태그 1-2개

  newsletter: |
    [뉴스레터 초안 작성 조건]
    1. 한 문단 요약, 인사이트, 한 줄 결론 구조로 작성하세요.
    2. 450자 이상 900자 이하로 작성하세요.
    3. 직장인 독자가 읽는다는 전제로 해석과 시사점을 덧붙이세요.
    4. 반드시 <newsletter> 와 </newsletter> 태그 안에만 작성하세요.

  threads: |
    [Threads 초안 작성 조건]
    1. 500자 이내로 작성하세요.
    2. 캐주얼하고 친구에게 말하듯 작성하세요. 존댓말보다 반말/친근체 선호.
    3. 줄바꿈을 적극 활용해 가독성을 높이세요 (한 문장당 한 줄).
    4. 공감 포인트를 먼저 던지고, 마지막에 댓글/저장을 유도하세요.
    5. 해시태그는 3개 이내로 끝에 자연스럽게 붙이세요.
    6. 이모지는 2-3개 적절히 활용하세요.
    7. 참고 톤: '{threads_tone}'
    8. 반드시 <threads> 와 </threads> 태그 안에만 작성하세요.

  naver_blog: |
    [네이버 블로그 초안 작성 조건]
    1. 1500자 이상 3000자 이하로 작성하세요.
    2. 소제목(##)을 3~4개 사용해 구조화된 글을 작성하세요.
    3. 도입(공감 유도) → 본문(사례/인사이트) → 결론(마무리+CTA) 구조를 따르세요.
    4. 검색 유입을 고려해 핵심 키워드를 자연스럽게 반복하세요.
    5. SEO 해시태그 15개를 글 끝에 추가하세요.
    6. 전문적이지만 읽기 쉬운 어조로, 표나 리스트를 활용하세요.
    7. 참고 톤: '{naver_blog_tone}'
    8. 반드시 <naver_blog> 와 </naver_blog> 태그 안에만 작성하세요.

  thinking_framework: |
    [사고 과정 — <thinking> 태그 안에 작성]
    초안을 작성하기 전에 반드시 아래를 먼저 분석하세요:
    1. 이 글의 핵심 인사이트는 무엇인가? (한 문장)
    2. 직장인이 공유하고 싶은 포인트는? (공감/분노/놀라움 중 택1과 이유)
    3. 가장 강한 훅이 될 숫자/인용구/대비는?
    4. 피해야 할 함정은? (상투적 표현, 원문에 없는 내용 날조)
    반드시 <thinking> 와 </thinking> 태그 안에만 작성하세요.

  image_prompt: |
    [이미지 프롬프트 작성 조건]
    1. 마지막에 영어 이미지 프롬프트를 작성하세요.
    2. 텍스트 없는 장면 중심 이미지여야 합니다.
    3. 직장인 커뮤니티 상황이 한눈에 보이게 묘사하세요.
    4. 반드시 <image_prompt> 와 </image_prompt> 태그 안에만 작성하세요.

# ===================================================================
# P0-A2: 시즌 트렌드 가중치 (월별 토픽 부스트)
# ===================================================================
season_weights:
  # 각 월에 특정 토픽이 트렌딩될 확률이 높은 시기
  1:  { "연봉": 10, "재테크": 8 }            # 연말정산, 새해 재테크
  2:  { "연봉": 8, "이직": 5 }               # 연봉 협상 시즌
  3:  { "이직": 10, "회사문화": 5 }           # 인사평가 후 이직 시즌
  4:  { "이직": 8, "자기계발": 5 }            # 상반기 채용 시작
  5:  { "복지": 5, "건강": 5 }               # 가정의 달, 건강검진
  6:  { "이직": 5, "상사": 5 }               # 상반기 마무리
  7:  { "복지": 8, "건강": 5 }               # 여름 휴가, 워라밸
  8:  { "복지": 5, "직장개그": 5 }            # 여름 끝, 번아웃
  9:  { "이직": 8, "자기계발": 5 }            # 하반기 채용 시작
  10: { "이직": 5, "회사문화": 5 }            # 인사평가 준비
  11: { "연봉": 5, "회사문화": 8 }            # 연봉 협상, 인사평가
  12: { "연봉": 10, "재테크": 10, "이직": 5 } # 연말정산, 연봉 공개

# Phase 4-C: 시간대·토픽별 동적 프롬프트 변형
prompt_variants:
  # 시간대별 접두어 (KST 기준)
  time_context:
    오전:   # 06:00–11:59
      prefix: "출근 준비 중인 직장인들이 딱 공감할"
      tone_hint: "출근 전 짧게 읽히는 핵심만, 에너지 넘치게"
    점심:   # 12:00–13:59
      prefix: "점심시간 직장인들이 폰으로 읽을"
      tone_hint: "가볍고 재미있게, 5분 안에 읽히도록"
    오후:   # 14:00–17:59
      prefix: "오후 업무 중 숨돌리는 직장인들의"
      tone_hint: "공감 유발 강하게, 댓글 달고 싶게"
    저녁:   # 18:00–21:59
      prefix: "퇴근 후 소파에서 직장인들이 공감하는"
      tone_hint: "하루 풀리는 느낌, 솔직하고 따뜻하게"
    심야:   # 22:00–05:59
      prefix: "잠 못 드는 직장인들의 솔직한"
      tone_hint: "감성적이고 진솔하게, 공감의 밀도 높이게"

  # 토픽 클러스터별 훅 가이드
  topic_hooks:
    연봉:
      opener: "연봉 이야기는 언제나 직격탄"
      cta: "여러분 연봉은 어떠세요? 댓글로 알려주세요 👇"
    이직:
      opener: "이직은 배신이 아니라 생존 전략"
      cta: "지금 이직 생각 있으신 분? 저만 이런 거 아니죠?"
    회사문화:
      opener: "회사문화, 이게 맞는 건지 아직도 모르겠음"
      cta: "여러분 회사는 어떤가요? RT로 공감 표현해주세요"
    상사:
      opener: "상사 이야기는 영원히 끝나지 않는 레전드"
      cta: "비슷한 상사 있으신 분 👋 댓글로 위로해드립니다"
    복지:
