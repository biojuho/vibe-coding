headless: true

input_sources:
  - "blind"

output_formats:
  - "twitter"
  - "newsletter"

content_strategy:
  primary_source: "blind"
  primary_channel: "twitter"
  support_channels:
    - "newsletter"
  require_human_approval: true

llm:
  strategy: "fallback"
  providers:
    - "gemini"
    - "deepseek"
    - "xai"
    - "moonshot"
    - "zhipuai"
    - "openai"
    - "anthropic"
  max_retries_per_provider: 2
  request_timeout_seconds: 45
  cache_enabled: true
  cache_ttl_hours: 72
  pricing:
    gemini:
      input_per_1m: 0.0
      output_per_1m: 0.0
    deepseek:
      input_per_1m: 0.14
      output_per_1m: 0.28
    xai:
      input_per_1m: 0.0
      output_per_1m: 0.0
    moonshot:
      input_per_1m: 0.12
      output_per_1m: 0.12
    zhipuai:
      input_per_1m: 0.0
      output_per_1m: 0.0
    openai:
      input_per_1m: 0.15
      output_per_1m: 0.60
    anthropic:
      input_per_1m: 0.80
      output_per_1m: 4.00

ranking:
  enabled: true
  final_rank_min: 60
  llm_viral_boost: false
  weights:
    scrape_quality: 0.35
    publishability: 0.40
    performance: 0.25

review:
  queue_limit_per_run: 10
  auto_move_to_review_threshold: 65
  reject_on_missing_title: true
  reject_on_missing_content: true

analytics:
  lookback_days: 30
  success_window_hours: 24
  top_examples_limit: 5
  minimum_posts_for_feedback: 20

blind:
  email: "${BLIND_EMAIL}"
  password: "${BLIND_PASSWORD}"

anthropic:
  enabled: true
  api_key: "${ANTHROPIC_API_KEY}"
  model: "claude-haiku-4-5-20251001"

gemini:
  enabled: true
  api_key: "${GEMINI_API_KEY}"
  model: "gemini-2.5-flash"

deepseek:
  enabled: true
  api_key: "${DEEPSEEK_API_KEY}"
  model: "deepseek-chat"

moonshot:
  enabled: true
  api_key: "${MOONSHOT_API_KEY}"
  model: "moonshot-v1-8k"

zhipuai:
  enabled: true
  api_key: "${ZHIPUAI_API_KEY}"
  model: "glm-4-flash"

xai:
  enabled: true
  api_key: "${XAI_API_KEY}"
  model: "grok-4-1-fast-reasoning"

openai:
  enabled: true
  chat_enabled: true
  api_key: "${OPENAI_API_KEY}"
  chat_model: "gpt-4o-mini"
  image_model: "dall-e-3"

twitter:
  consumer_key: "${TWITTER_CONSUMER_KEY}"
  consumer_secret: "${TWITTER_CONSUMER_SECRET}"
  access_token: "${TWITTER_ACCESS_TOKEN}"
  access_token_secret: "${TWITTER_ACCESS_TOKEN_SECRET}"
  enabled: false

limits:
  daily_api_budget_usd: 3.0
  max_posts_per_day: 10

notion:
  api_key: "${NOTION_API_KEY}"
  database_id: "${NOTION_DATABASE_ID}"
  properties:
    title: "콘텐츠"
    memo: "메모"
    status: "상태"
    date: "생성일"
    image_needed: "이미지 필요"
    tweet_body: "트윗 본문"
    url: "Source URL"
    tweet_url: "트윗 링크"
    views: "24h 조회수"
    likes: "24h 좋아요"
    retweets: "24h 리트윗"
    source: "원본 소스"
    feed_mode: "피드 모드"
    topic_cluster: "토픽 클러스터"
    hook_type: "훅 타입"
    emotion_axis: "감정 축"
    audience_fit: "대상 독자"
    scrape_quality_score: "스크랩 품질 점수"
    publishability_score: "발행 적합도 점수"
    performance_score: "성과 예측 점수"
    final_rank_score: "최종 랭크 점수"
    review_status: "승인 상태"
    review_note: "검토 메모"
    chosen_draft_type: "선택 초안 타입"
    newsletter_body: "뉴스레터 초안"
    publish_channel: "발행 채널"
    published_at: "발행 시각"
    performance_grade: "성과 등급"
  status_default: "검토필요"

image:
  provider: "gemini"
  min_prompt_words: 5

image_hosting:
  provider: "cloudinary"
  imgur:
    client_id: "${IMGUR_CLIENT_ID}"
  cloudinary:
    cloud_name: "${CLOUDINARY_CLOUD_NAME}"
    api_key: "${CLOUDINARY_API_KEY}"
    api_secret: "${CLOUDINARY_API_SECRET}"

tweet_style:
  tone: "위트 있고 공감 가는"
  max_length: 280
  format: "markdown"
  include_hashtags: false
  hashtags: []

screenshot_dir: "./screenshots"
screenshot_retention_days: 7
scrape_limit: ${SCRAPE_LIMIT}
delay_seconds: 5

proxy:
  enabled: false
  list: []

request:
  timeout_seconds: 20
  retries: 3
  backoff_seconds: 1.5

scrape_quality:
  min_content_length: 20
  min_korean_ratio: 0.15
  require_title: true
  max_empty_field_ratio: 0.4
  selector_timeout_ms: 5000
  direct_fallback_timeout_ms: 8000
  save_failure_snapshot: true
  failure_snapshot_dir: ".tmp/failures"

dedup:
  cache_ttl_minutes: 30
  lookback_days: 14
  semantic_enabled: true
  embedding_model: "text-embedding-004"

browser:
  pool_size: 1

ml:
  min_training_rows: 100
  retrain_threshold: 20

circuit_breaker:
  session_skip_threshold: 3
  initial_skip_hours: 1.0

cross_source_insight:
  enabled: true
  min_posts: 3
  min_sources: 2

trends:
  enabled: false
  google_enabled: true
  naver_enabled: true
  spike_threshold: 80.0
  cache_ttl_minutes: 10

schedule:
  enabled: true
  cron: "0 */3 * * *"
  timezone: "Asia/Seoul"
