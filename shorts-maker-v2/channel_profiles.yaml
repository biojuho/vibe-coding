      - "이집트"
      - "로마"
      - "르네상스"
      - "중세"
      - "삼국시대"
    highlight_color: "#D4A574"             # 골드 (역사 채널 톤)
    # Factory 통합 필드
    palette: {primary: "#D4A574", secondary: "#8B6914", accent: "#C41E3A", bg: "#1A1408"}
    font: {title: "NanumMyeongjo", body: "NanumGothic"}
    hook_style: "typewriter"
