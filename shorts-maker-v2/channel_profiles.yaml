  # ────────────────────────────────────────────────────────
  # 🔭 도파민 랩 — 우주/천문학
  # ────────────────────────────────────────────────────────
  space:
    display_name: "도파민 랩"
    youtube_url: "https://www.youtube.com/@DOPAMINE_L_A_B"
    category: "우주/천문학"
    notion_channel_name: "우주/천문학"

