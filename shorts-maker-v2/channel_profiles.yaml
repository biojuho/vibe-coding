# ============================================================
# 채널별 파이프라인 프로파일 (channel_profiles.yaml)
# shorts-maker-v2 / 숏츠팀 5채널 커스터마이징 설정
# ============================================================
# 사용법:
#   python -m shorts_maker_v2 --channel ai_tech "OpenAI o3 발표"
#   python -m shorts_maker_v2 --channel psychology "인지 부조화 실험"
# ============================================================

channels:

  # ────────────────────────────────────────────────────────
  # 🤖 퓨처 시냅스 — AI/기술
  # ────────────────────────────────────────────────────────
  ai_tech:
    display_name: "퓨처 시냅스"
    youtube_url: "https://www.youtube.com/@퓨처시냅스"
    category: "AI/기술"
    notion_channel_name: "AI/기술"

    # TTS 설정 (권위적·미래지향적 톤)
    tts_voice: "ko-KR-InJoonNeural"        # 남성, 강하고 권위적 → 뉴스 앵커 느낌
    tts_speed: 1.15                         # 빠른 정보 전달
    tts_voice_roles:
      hook: ko-KR-InJoonNeural
      body: ko-KR-HyunsuNeural             # 차분하고 지적인 해설
      cta: ko-KR-InJoonNeural

    # 시각 스타일
    visual_styles:
      - "Neon cyberpunk aesthetic, dark background, glowing blue/purple elements, tech HUD overlay"
      - "Futuristic data visualization, holographic UI, electric blue color scheme, 4K"
      - "Silicon chip micro photography, circuit board patterns, deep blue tones, cinematic"
      - "AI neural network visualization, glowing nodes, dark space background, ultra HD"

    # 스크립트 생성 파라미터 (채널 최적화)
    target_duration_sec: 30          # 실측 TTS가 +40~80% 길어지므로 보수적 설정 (60초 제한)
    target_chars: "250-290"          # 30초 x 8.5cps x 1.15speed
    hook_pattern: "shocking_stat"    # 충격 통계/수치로 시작

    # 콘텐츠 구조
    structure_presets:
      - listicle   # "AI가 바꾼 TOP 5 직업"
      - debate     # "AI는 인류를 구할까 vs 멸망시킬까"
      - countdown  # "GPT-5까지 5단계 진화"
    default_structure: "listicle"

    # 페르소나 톤 가이드
    persona_channel_context: |
      채널: 퓨처 시냅스 (AI/기술 전문 숏츠)
      타겟 시청자: 20-40대 테크 얼리어답터, 개발자, 스타트업 종사자
      채널 포지셔닝: "한국어로 가장 빠른 AI 뉴스 큐레이션, 전문적이면서 쉽게"
      톤: 권위 있고 정보 밀도 높으며 미래 지향적. 데이터와 수치 강조.
      후킹 스타일: "충격적인 AI 사실", "99% 모르는 기술", "X년 안에 사라질 직업"
      금지: 지나친 감성, 힐링 표현. 팩트와 수치 위주.

    # BGM 에너지
    bgm_energy: "high"                      # 긴장감 있는 전자음악
    caption_style: "neon"                   # 네온 자막 스타일
    # 자막 조합: hook=neon(시각적 충격), body=default(가독성), cta=bold(행동 유도)
    caption_combo: ["neon", "default", "bold"]
    intro_path: "assets/intros/ai_tech_intro.png"
    intro_duration: 2.0

  # ────────────────────────────────────────────────────────
  # 🧠 토닥토닥 심리 — 심리학
  # ────────────────────────────────────────────────────────
  psychology:
    display_name: "토닥토닥 심리"
    youtube_url: "https://www.youtube.com/@토닥토닥_심리"
    category: "심리학"
    notion_channel_name: "심리학"

    # TTS 설정 (따뜻하고 공감하는 톤)
    tts_voice: "ko-KR-SoonBokNeural"       # 여성, 부드럽고 안정적
    tts_speed: 1.0                          # 천천히, 공감적
    tts_voice_roles:
      hook: ko-KR-SunHiNeural              # 밝고 자연스러운 오프닝
      body: ko-KR-SoonBokNeural            # 부드럽고 안정적인 해설
      cta: ko-KR-BongJinNeural             # 따뜻하고 친근한 마무리

    # 시각 스타일
    visual_styles:
      - "Soft watercolor illustration, warm pastel colors, cozy atmosphere, minimal"
      - "Gentle bokeh background, warm amber tones, human silhouette, emotional"
      - "Clean infographic style, muted earth tones, simple shapes, friendly"
      - "Dreamy soft focus photography, warm golden hour light, peaceful nature"

    # 스크립트 생성 파라미터 (채널 최적화)
    target_duration_sec: 40          # 실측 TTS 보정 (60초 제한)
    target_chars: "330-370"          # 40초 x 8.5cps x 1.00speed
    hook_pattern: "relatable_frustration"  # 공감·감성 후킹

    # 콘텐츠 구조
    structure_presets:
      - story      # "한 직장인의 번아웃 이야기"
      - quiz       # "당신은 어떤 애착 유형?"
      - listicle   # "자존감 높이는 심리 습관 5가지"
    default_structure: "story"

    # 페르소나 톤 가이드
    persona_channel_context: |
      채널: 토닥토닥 심리 (심리학 전문 숏츠)
      타겟 시청자: 20-30대 자기계발 관심층, 직장인, 연애/관계 고민자
      채널 포지셔닝: "일상 속 심리학, 따뜻하게 나를 이해하는 60초"
      톤: 공감적, 따뜻함, 힐링. "나만 그런 게 아니야"라는 위안을 주는 톤.
      후킹 스타일: "혹시 이런 경험 있으신가요?", "이게 다 심리학 때문이에요"
      금지: 차갑고 딱딱한 학술 용어. 쉽고 감성적으로 풀어쓰기.

    # BGM 에너지
    bgm_energy: "calm"                      # 잔잔하고 따뜻한 배경음악
    caption_style: "subtitle"              # 부드러운 자막 스타일
    # 자막 조합: hook=subtitle(부드럽게), body=subtitle(일관성), cta=default(깔끔)
    caption_combo: ["subtitle", "subtitle", "default"]
    intro_path: "assets/intros/psychology_intro.png"
    intro_duration: 2.0

  # ────────────────────────────────────────────────────────
  # 🏺 역사팝콘 — 역사/고고학
  # ────────────────────────────────────────────────────────
  history:
    display_name: "역사팝콘"
    youtube_url: "https://www.youtube.com/@역사팝콘"
    category: "역사/고고학"
    notion_channel_name: "역사/고고학"

    # TTS 설정 (스토리텔링 내레이터 톤)
    tts_voice: "ko-KR-BongJinNeural"       # 남성, 따뜻하고 친근한 이야기꾼
    tts_speed: 1.05
    tts_voice_roles:
      hook: ko-KR-GookMinNeural            # 또렷하고 강렬한 오프닝
      body: ko-KR-BongJinNeural            # 친근한 이야기 전개
      cta: ko-KR-SunHiNeural              # 밝은 마무리

    # 시각 스타일
    visual_styles:
      - "Ancient map illustration, aged parchment texture, sepia tones, vintage cartography"
      - "Historical painting style, renaissance composition, dramatic chiaroscuro lighting"
      - "Archaeological excavation photography, earth tones, dramatic discovery moment"
      - "Vintage film grain, warm sepia/amber tones, aged documentary aesthetic"
      - "Epic historical scene, wide angle, dramatic sky, cinematic color grading"

    # 스크립트 생성 파라미터 (채널 최적화)
    target_duration_sec: 38          # 실측 TTS 보정 (60초 제한)
    target_chars: "320-360"          # 38초 x 8.5cps x 1.05speed
    hook_pattern: "myth_busting"     # "사실은 이게 아니에요" 반전 훅

    # 콘텐츠 구조
    structure_presets:
      - story      # "고대 로마 멸망의 3가지 진짜 이유"
      - countdown  # "역사를 바꾼 결정 TOP 5"
      - debate     # "클레오파트라는 정말 미인이었을까?"
    default_structure: "story"

    # 페르소나 톤 가이드
    persona_channel_context: |
      채널: 역사팝콘 (역사/고고학 전문 숏츠)
      타겟 시청자: 15-45대 역사 관심층, 학생, 재미있는 이야기 좋아하는 사람
      채널 포지셔닝: "팝콘 먹듯 즐기는 역사의 반전들, 스낵처럼 가볍지만 정확한"
      톤: 흥미롭고 반전 있는 스토리텔링. "알고 보면 충격적인" 역사 사실.
      후킹 스타일: "역사 교과서에 없는 충격적인 사실", "X가 사실은 Y였다는 거 알아?"
      금지: 너무 딱딱한 연대기 나열. 드라마틱하게 이야기처럼 풀어쓰기.

    # BGM 에너지
    bgm_energy: "medium"                    # 서사적이고 웅장한 오케스트라
    caption_style: "bold"                  # 굵고 임팩트 있는 자막
    # 자막 조합: hook=bold(반전의 강조), body=subtitle(스토리텔링), cta=cta(화려한 마무리)
    caption_combo: ["bold", "subtitle", "cta"]
    intro_path: "assets/intros/history_intro.png"
    intro_duration: 2.0

  # ────────────────────────────────────────────────────────
  # 🔭 도파민 랩 — 우주/천문학
  # ────────────────────────────────────────────────────────
  space:
    display_name: "도파민 랩"
    youtube_url: "https://www.youtube.com/@DOPAMINE_L_A_B"
    category: "우주/천문학"
    notion_channel_name: "우주/천문학"

    # TTS 설정 (경이로움을 자아내는 톤)
    tts_voice: "ko-KR-HyunsuNeural"        # 남성, 차분하고 지적인 → 다큐멘터리 내레이터
    tts_speed: 1.1
    tts_voice_roles:
      hook: ko-KR-GookMinNeural            # 또렷하고 낮은 톤 → 우주적 느낌
      body: ko-KR-HyunsuNeural             # 차분하고 지적인 해설
      cta: ko-KR-InJoonNeural              # 강한 마무리

    # 시각 스타일
    visual_styles:
      - "Ultra-realistic space photography, Milky Way galaxy, cosmic dust, 8K HDR"
      - "NASA Hubble telescope style, nebula with vivid colors, deep space, photorealistic"
      - "3D rendered solar system, dramatic planetary close-up, volumetric light"
      - "Dark universe, solitary planet, distant stars, cinematic widescreen, epic scale"
      - "Astronaut POV, Earth from space, curved horizon, ISS perspective"

    # 스크립트 생성 파라미터 (채널 최적화)
    target_duration_sec: 35          # 실측 TTS 보정 (60초 제한)
    target_chars: "310-350"          # 35초 x 8.5cps x 1.10speed
    hook_pattern: "counterintuitive_question"  # 역발상 질문으로 경이로움 유발

    # 콘텐츠 구조
    structure_presets:
      - listicle   # "우주에서 가장 이상한 행성 TOP 5"
      - quiz       # "우리 은하 끝까지 가면 얼마나 걸릴까?"
      - debate     # "외계생명체는 존재한다 vs 우리가 유일하다"
    default_structure: "listicle"

    # 페르소나 톤 가이드
    persona_channel_context: |
      채널: 도파민 랩 (우주/천문학 전문 숏츠)
      타겟 시청자: 10-40대 우주 관심층, 과학 좋아하는 사람, 경이로움 추구자
      채널 포지셔닝: "우주가 주는 도파민, 사실이 SF보다 짜릿하다"
      톤: 경이롭고 웅장하며 감탄을 자아내는. "이게 실화야?" 라는 반응 유도.
      후킹 스타일: "우주를 알면 잠 못 자게 됩니다", "NASA가 발표한 충격적인 사실"
      금지: 지루한 수치 나열. 비유와 비교를 통해 스케일을 체감시키기.

    # BGM 에너지
    bgm_energy: "epic"                      # 한스 짐머 스타일 웅장한 음악
    caption_style: "neon"                  # 우주적 네온 자막
    # 자막 조합: hook=neon(우주적 경이), body=neon(일관된 우주 감성), cta=bold(강렬한 마무리)
    caption_combo: ["neon", "neon", "bold"]
    intro_path: "assets/intros/space_intro.png"
    intro_duration: 2.0

  # ────────────────────────────────────────────────────────
  # 💊 건강 스포일러 — 의학/건강
  # ────────────────────────────────────────────────────────
  health:
    display_name: "건강 스포일러"
    youtube_url: "https://www.youtube.com/@건강스포일러"
    category: "의학/건강"
    notion_channel_name: "의학/건강"

    # TTS 설정 (신뢰감 있고 친근한 의사 톤)
    tts_voice: "ko-KR-HyunsuNeural"        # 남성, 차분하고 지적 → 의사 느낌
    tts_speed: 1.05
    tts_voice_roles:
      hook: ko-KR-SunHiNeural              # 밝은 오프닝 → 친근한 접근
      body: ko-KR-HyunsuNeural             # 권위 있는 의학 정보
      cta: ko-KR-BongJinNeural             # 따뜻한 마무리 조언

    # 시각 스타일
    visual_styles:
      - "Clean medical infographic, white background, simple icons, safe professional blue/green, no anatomy"
      - "Healthy lifestyle photography, vibrant fresh food, bright natural light, clean aesthetic, no medical tools"
      - "Abstract molecular structure, soft glowing particles, medical blue tones, no human body parts"
      - "Flat design health icons, pastel colors, clean data visualization, no blood or surgery"

    # 스크립트 생성 파라미터 (채널 최적화)
    target_duration_sec: 35          # 실측 TTS 보정 (60초 제한)
    target_chars: "300-340"          # 35초 x 8.5cps x 1.05speed
    hook_pattern: "shocking_stat"    # "성인 3명 중 1명" 등 통계 훅

    # 콘텐츠 구조
    structure_presets:
      - listicle   # "면역력 높이는 음식 TOP 5"
      - quiz       # "이 증상이 있으면 당신도 위험?"
      - story      # "갑자기 쓰러진 40대 직장인의 진단"
    default_structure: "listicle"

    # 페르소나 톤 가이드
    persona_channel_context: |
      채널: 건강 스포일러 (의학/건강 전문 숏츠)
      타겟 시청자: 30-60대 건강 관심층, 직장인, 만성질환 예방 관심자
      채널 포지셔닝: "영화 스포일러처럼, 건강 정보 핵심만 먼저 알려드림"
      톤: 신뢰감 있고 친근한 전문가. "이것만 알면 충분해요" 라는 명확함.
      후킹 스타일: "이 음식 먹으면 수명 단축됩니다", "의사들이 숨기는 건강 비밀"
      금지: 섣부른 의학적 진단이나 대체의학 권장. 정확한 의학 정보 기반.

    # BGM 에너지
    bgm_energy: "medium"                    # 담담하고 안정적인 배경음악
    caption_style: "default"               # 깔끔한 기본 자막
    # 자막 조합: hook=bold(건강 경고 강조), body=subtitle(신뢰감), cta=default(전문적 마무리)
    caption_combo: ["bold", "subtitle", "default"]
    intro_path: "assets/intros/health_intro.png"
    intro_duration: 2.0
