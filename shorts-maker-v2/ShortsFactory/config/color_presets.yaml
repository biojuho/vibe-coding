# ============================================================
# ShortsFactory 컬러 그레이딩 프리셋 (color_presets.yaml)
# 채널별 영상 분위기를 결정하는 컬러 보정 파라미터
# ============================================================
# 값 범위:
#   brightness : -1.0 ~ 1.0 (0 = 원본)
#   contrast   : 0.0 ~ 3.0 (1.0 = 원본)
#   saturation : 0.0 ~ 3.0 (1.0 = 원본)
#   hue_shift  : -180 ~ 180 (0 = 원본, 도 단위)
#   gamma      : 0.1 ~ 5.0 (1.0 = 원본)
#   vignette   : 0.0 ~ 1.0 (0 = 없음, 1 = 최대)
#   tint       : hex color (선택적 색조 레이어)
#   tint_opacity: 0.0 ~ 1.0

presets:

  # 🤖 AI/기술 — 네온 사이버펑크
  neon_tech:
    brightness: 0.05
    contrast: 1.25
    saturation: 1.4
    hue_shift: 0
    gamma: 0.95
    vignette: 0.3
    tint: "#00D4FF"
    tint_opacity: 0.08

  # 🧠 심리학 — 몽환적 퍼플
  dreamy_purple:
    brightness: 0.08
    contrast: 1.1
    saturation: 1.2
    hue_shift: 15
    gamma: 1.05
    vignette: 0.2
    tint: "#E879F9"
    tint_opacity: 0.1

  # 🏺 역사 — 빈티지 세피아
  vintage_sepia:
    brightness: -0.03
    contrast: 1.15
    saturation: 0.7
    hue_shift: 25
    gamma: 1.1
    vignette: 0.4
    tint: "#D4A574"
    tint_opacity: 0.15

  # 🔭 우주 — 딥 스페이스
  deep_space:
    brightness: -0.05
    contrast: 1.35
    saturation: 1.3
    hue_shift: -10
    gamma: 0.85
    vignette: 0.5
    tint: "#818CF8"
    tint_opacity: 0.06

  # 💊 건강 — 클린 메디컬
  clean_medical:
    brightness: 0.1
    contrast: 1.05
    saturation: 1.0
    hue_shift: 0
    gamma: 1.0
    vignette: 0.1
    tint: "#34D399"
    tint_opacity: 0.05
