# Ruff configuration for Joolife Hub root repository
target-version = "py311"

line-length = 120

[lint]
select = ["E", "F", "W"]
ignore = ["E501"]  # line-too-long: 기존 코드베이스 호환성 유지

[lint.per-file-ignores]
# Legacy manual test scripts: sys.path manipulation before imports is intentional
"tests/legacy_manual/*.py" = ["E402"]
# code_improver uses single-letter vars in generator expressions (line-processing)
"execution/code_improver.py" = ["E741"]
# Old verify scripts: informal style is intentional
"tests/verify_all*.py" = ["E701", "F401"]
"tests/verify_ux_v2.py" = ["E402", "F401"]
