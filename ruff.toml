# Ruff configuration for Joolife Hub root repository
target-version = "py311"

line-length = 120

[lint]
select = ["E", "F", "W"]
ignore = ["E501", "E402"]  # E501: 기존 코드베이스 호환성, E402: sys.path 조작 후 import 패턴 허용

[lint.per-file-ignores]
# code_improver uses single-letter vars in generator expressions (line-processing)
"workspace/execution/code_improver.py" = ["E741"]
# Legacy manual test scripts
"workspace/tests/legacy_manual/*.py" = ["E402"]
"workspace/tests/verify_all*.py" = ["E701", "F401"]
"workspace/tests/verify_ux_v2.py" = ["E402", "F401"]
