# SAMPLE 파일 — `execution/blind_to_x_eval_extract.py --apply` 실행 시 동일 디렉터리에
# `rejected_cases.yaml`이 자동 생성된다.
#
# 운영자 거부(`패스`) + reviewer_memo 가 있는 Notion 페이지의 원문 + 거부 드래프트가 들어간다.
# promptfoo는 현재 프롬프트가 같은 종류의 실수를 재현하지 않는지 평가 (anti-pattern).

label: rejected
count: 2
tests:
  - description: "패스:11abcdef-3333-4444-5555-aabbccdd0011"
    vars:
      source_text: |
        실적 1위 찍었는데 인센티브가 50만원. 동기는 평균 실적인데 팀장 라인이라 200만원 받음.
        팀장이 미안한 표정 짓는데 그게 더 짜증남.
      page_id: "11abcdef-3333-4444-5555-aabbccdd0011"
      rejected_draft: |
        실적 1위인데 50만원, 팀장 라인은 200만원. 여러분도 이런 경험 있으세요?
        공정한 평가가 정말 가능할까요? 👇 #직장인 #불공정 #이직고민
      reviewer_memo: |
        generic CTA ("여러분도... 있으세요?", "공정한 평가가 정말 가능할까요?") 두 번 연속 사용,
        해시태그 본문에 노출 (링크-인-리플라이 위반), 이모지 사용. 톤이 AI 말투.

  - description: "패스:22fedcba-4444-5555-6666-bbccddee1122"
    vars:
      source_text: |
        아침마다 9시 1분에 출근해도 팀장이 째려봄. 점심 12시 정시 출발하면 일찍 가냐는 표정.
        칼퇴는 일 다 끝내도 눈치보임. 그러면서 워라밸 좋은 회사라고 홍보함.
      page_id: "22fedcba-4444-5555-6666-bbccddee1122"
      rejected_draft: |
        한국 회사의 워라밸 실태: 정시 출근도 일찍 가도 칼퇴도 다 눈치. 진짜 워라밸 좋은 회사는 어디 있을까요?
        혹시 알고 계신 좋은 회사가 있다면 댓글로 공유 부탁드려요!
      reviewer_memo: |
        "한국 회사의 워라밸 실태:" 같은 신문기사 도입부 톤 — 자연스러운 회사 후기 톤이 아님.
        "혹시 알고 계신... 부탁드려요" 어색한 격식체 (ADR-010 위반: 자연스러움 우선).
        장면·대사·숫자로 시작 안 함 (브리프 위반).
