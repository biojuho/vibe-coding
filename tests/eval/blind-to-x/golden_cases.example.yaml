# `golden_cases.yaml`이 자동 생성된다 (이 example은 구조 참조용, gitignored 실제 파일과 별개).
#
# 운영자 승인(`승인됨`)을 받은 Notion 페이지의 원문 + 채택 드래프트가 들어간다.
# promptfoo가 이 케이스를 vars로 받아 현재 프롬프트가 비슷한 품질의 드래프트를 생성하는지 평가.

label: golden
count: 2
tests:
  - description: "승인됨:21345678-aaaa-bbbb-cccc-1234567890ab"
    vars:
      source_text: |
        연봉 협상 끝났는데 3% 인상이라네. 5년차에 사수도 없고 막내 시절보다 일은 두 배인데.
        팀장은 그래도 인상은 했잖아? 라는 식. 이직 준비 슬슬 해야 하나.
      page_id: "21345678-aaaa-bbbb-cccc-1234567890ab"
      accepted_draft: |
        5년차 연봉 협상 결과: 3%. 막내 때보다 일은 두 배인데 인상은 물가도 못 따라가는 수준.
        팀장은 "그래도 인상은 했잖아"라며 마무리. 버티는 시간을 깎아 이직 준비에 투자해야 할
        시점인지, 한 번 더 협상을 시도할 시점인지 — 어디에 더 마음이 가나요?

  - description: "승인됨:31abcdef-2222-3333-4444-fedcba012345"
    vars:
      source_text: |
        팀 회식 중에 부장이 갑자기 본인 라떼 얘기 시작. 그 시절 우리는 야근 12시까지가 기본이었지.
        막내가 표정 굳어가는데 아무도 못 끊음. 나도 막내 때 저런 자리 잘 버텼는데 지금은 그게 부끄러움.
      page_id: "31abcdef-2222-3333-4444-fedcba012345"
      accepted_draft: |
        회식 중 부장의 라떼 모드 발동. "그 시절 우리는 12시 야근이 기본이었지." 막내 표정 굳어가는 게
        보이는데 누구도 끊지 못함. 나도 막내 때 저런 자리 잘 버텼다고 자랑처럼 말한 적 있는데
        지금 와서 보면 그게 제일 부끄러운 장면. 회식에서 라떼 끊는 막내가 옳다.
