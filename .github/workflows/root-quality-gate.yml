name: root-quality-gate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  root-quality-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: requirements-quality.txt

      - name: Install quality dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-quality.txt

      - name: Run root quality gate
        run: python scripts/quality_gate.py
