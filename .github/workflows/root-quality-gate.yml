name: root-quality-gate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

# 기본 권한: 읽기만. 권한이 필요한 step은 job/step 단위로 명시.
permissions:
  contents: read

# 동일 PR/브랜치에 새 push가 오면 진행 중인 실행은 취소해 CI 분 절약.
# main 브랜치 push는 cancel하지 않는다(릴리스 흐름 보호).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  root-quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - name: Install quality dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest ruff requests python-dotenv croniter Pillow deptry

      - name: Check directive mapping
        run: python workspace/scripts/check_mapping.py

      - name: Compile workspace modules
        run: python -m compileall workspace/execution workspace/scripts

      - name: Run focused workspace regression tests
        run: >
          python -m pytest
          workspace/tests/test_governance_checks.py
          workspace/tests/test_doctor.py
          workspace/tests/test_health_check.py
          workspace/tests/test_qaqc_runner.py
          workspace/tests/test_qaqc_runner_extended.py
          workspace/tests/test_project_qc_runner.py
          workspace/tests/test_mcp_config.py
          workspace/tests/test_auto_schedule_paths.py
          workspace/tests/test_skill_lint.py
          workspace/tests/test_auto_research_completion_audit.py
          workspace/tests/test_auto_research_browser_qa_inventory.py
          workspace/tests/test_auto_research_dependency_freshness_inventory.py
          workspace/tests/test_auto_research_launch_objective_audit.py
          workspace/tests/test_auto_research_next_experiment_selector.py
          workspace/tests/test_auto_research_release_authorization_packet.py
          workspace/tests/test_github_project_inventory.py
          workspace/tests/test_github_workflow_hygiene.py
          workspace/tests/test_next_task_id.py
          workspace/tests/test_task_id_gate.py
          -q
          -o addopts=

      - name: Lint workspace control plane
        run: >
          python -m ruff check
          workspace/scripts/check_mapping.py
          workspace/execution/governance_checks.py
          workspace/execution/health_check.py
          workspace/execution/qaqc_runner.py
          workspace/execution/qaqc_history_db.py
          execution/project_qc_runner.py
          workspace/tests/test_governance_checks.py
          workspace/tests/test_doctor.py
          workspace/tests/test_health_check.py
          workspace/tests/test_qaqc_runner.py
          workspace/tests/test_qaqc_runner_extended.py
          workspace/tests/test_project_qc_runner.py
          workspace/tests/test_mcp_config.py
          workspace/tests/test_auto_schedule_paths.py
          workspace/tests/test_skill_lint.py
          workspace/tests/test_auto_research_completion_audit.py
          workspace/tests/test_auto_research_browser_qa_inventory.py
          workspace/tests/test_auto_research_dependency_freshness_inventory.py
          workspace/tests/test_auto_research_launch_objective_audit.py
          workspace/tests/test_auto_research_next_experiment_selector.py
          workspace/tests/test_auto_research_release_authorization_packet.py
          workspace/tests/test_github_project_inventory.py
          workspace/tests/test_github_workflow_hygiene.py
          workspace/tests/test_next_task_id.py
          workspace/tests/test_task_id_gate.py
          execution/skill_lint.py
          execution/next_task_id.py
          execution/task_id_gate.py
          .agents/skills/auto-research/scripts/completion_audit.py
          .agents/skills/auto-research/scripts/github_project_inventory.py
          .agents/skills/auto-research/scripts/browser_qa_inventory.py
          .agents/skills/auto-research/scripts/dependency_freshness_inventory.py
          .agents/skills/auto-research/scripts/launch_objective_audit.py
          .agents/skills/auto-research/scripts/next_experiment_selector.py
          .agents/skills/auto-research/scripts/release_authorization_packet.py

      # Dependency hygiene (deptry): declared-vs-imported correctness across the
      # Python projects. Advisory — surfaces drift in logs without blocking the
      # gate (same policy as dependency_security_audit / code_review_gate). Flip
      # to blocking by removing `continue-on-error` or adding `--strict`.
      - name: Dependency hygiene audit (advisory)
        continue-on-error: true
        run: python execution/dependency_hygiene_audit.py
