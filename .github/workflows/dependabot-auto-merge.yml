# Dependabot auto-merge — patch 업데이트만 자동 스쿼시 머지
# QC 진단: 26개 이상의 Dependabot PR 방치 방지
#
# 막는 실패 모드:
#   보안 패치급 업데이트가 방치 → 알려진 취약점 누적
#
# 동작 조건:
#   - Dependabot이 올린 PR만 대상
#   - semver patch 업데이트만 자동 머지
#   - minor/major는 수동 리뷰 필요

name: Dependabot auto-merge

on: pull_request

# 기본은 read. dependabot job은 자체적으로 contents/pull-requests write 필요.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  dependabot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.actor == 'dependabot[bot]'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Auto-merge patch updates
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
