name: active-project-matrix

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHONUTF8: "1"
  PYTHONIOENCODING: "utf-8"

jobs:
  workspace-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest ruff requests python-dotenv croniter Pillow

      - name: Validate directive mapping
        run: python workspace/scripts/check_mapping.py

      - name: Compile workspace modules
        run: python -m compileall workspace/execution workspace/scripts

      - name: Run workspace quality tests
        run: >
          python -m pytest
          workspace/tests/test_governance_checks.py
          workspace/tests/test_doctor.py
          workspace/tests/test_health_check.py
          workspace/tests/test_qaqc_runner.py
          workspace/tests/test_qaqc_runner_extended.py
          workspace/tests/test_mcp_config.py
          -q
          -o addopts=

      - name: Ruff workspace checks
        run: >
          python -m ruff check
          workspace/scripts/check_mapping.py
          workspace/execution/governance_checks.py
          workspace/execution/health_check.py
          workspace/execution/qaqc_runner.py
          workspace/execution/qaqc_history_db.py
          workspace/tests/test_governance_checks.py
          workspace/tests/test_doctor.py
          workspace/tests/test_health_check.py
          workspace/tests/test_qaqc_runner.py
          workspace/tests/test_qaqc_runner_extended.py
          workspace/tests/test_mcp_config.py

  blind-to-x-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: projects/blind-to-x

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: projects/blind-to-x/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python - <<'PY'
          import pathlib
          import subprocess
          import sys
          import tomllib

          data = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))
          deps = list(data["project"]["dependencies"])
          deps.extend(data["project"].get("optional-dependencies", {}).get("dev", []))
          subprocess.check_call([sys.executable, "-m", "pip", "install", *deps])
          PY

      - name: Run blind-to-x unit tests
        run: python -m pytest tests/unit -q --tb=short --maxfail=1 -o addopts=

      - name: Run blind-to-x integration tests
        run: >
          python -m pytest tests/integration -q --tb=short --maxfail=1 -o addopts=
          --ignore=tests/integration/test_curl_cffi.py

  shorts-maker-v2-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: projects/shorts-maker-v2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: projects/shorts-maker-v2/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python - <<'PY'
          import pathlib
          import subprocess
          import sys
          import tomllib

          data = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))
          deps = list(data["project"]["dependencies"])
          deps.extend(data["project"].get("optional-dependencies", {}).get("dev", []))
          subprocess.check_call([sys.executable, "-m", "pip", "install", *deps])
          PY

      - name: Run shorts-maker-v2 tests
        env:
          PYTHONPATH: src
        run: python -m pytest tests/unit tests/integration -q --tb=short --maxfail=1 -o addopts=

  frontend-active-apps:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - hanwoo-dashboard
          - knowledge-dashboard

    defaults:
      run:
        working-directory: projects/${{ matrix.app }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: projects/${{ matrix.app }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

  test-summary:
    runs-on: ubuntu-latest
    if: always()
    needs:
      - workspace-quality
      - blind-to-x-tests
      - shorts-maker-v2-tests
      - frontend-active-apps

    steps:
      - name: Report results
        run: |
          echo "## Test Matrix Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| workspace-quality | ${{ needs.workspace-quality.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| blind-to-x-tests | ${{ needs.blind-to-x-tests.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| shorts-maker-v2-tests | ${{ needs.shorts-maker-v2-tests.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| frontend-active-apps | ${{ needs.frontend-active-apps.result }} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Check all passed
        if: >-
          needs.workspace-quality.result != 'success' ||
          needs.blind-to-x-tests.result != 'success' ||
          needs.shorts-maker-v2-tests.result != 'success' ||
          needs.frontend-active-apps.result != 'success'
        run: |
          echo "::error::One or more test jobs failed."
          exit 1
