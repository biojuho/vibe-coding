headless: true

input_sources:
  - "blind"

output_formats:
  - "twitter"

content_strategy:
  primary_source: "blind"
  primary_channel: "twitter"
  support_channels: []
  require_human_approval: true

llm:
  strategy: "fallback"
  # 비용 우선 순서: 무료/저가 provider부터 시도하고 Anthropic은 최후단에 둡니다.
  providers:
    - "gemini"      # free tier
    - "deepseek"    # low-cost default
    - "xai"         # free/low-cost tier
    - "moonshot"    # low-cost fallback
    - "zhipuai"     # low-cost fallback
    - "openai"      # paid fallback
    - "anthropic"   # highest-cost fallback
  max_retries_per_provider: 2
  request_timeout_seconds: 45
  cache_enabled: true
  cache_ttl_hours: 72
  pricing:
    gemini:
      input_per_1m: 0.0
      output_per_1m: 0.0
    deepseek:
      input_per_1m: 0.14
      output_per_1m: 0.28
    xai:
      input_per_1m: 0.0
      output_per_1m: 0.0
    moonshot:
      input_per_1m: 0.12
      output_per_1m: 0.12
    zhipuai:
      input_per_1m: 0.0
      output_per_1m: 0.0
    openai:
      input_per_1m: 0.15
      output_per_1m: 0.60
    anthropic:
      input_per_1m: 0.80   # claude-haiku-4-5
      output_per_1m: 4.00

ranking:
  enabled: true
  final_rank_min: 60
  # LLM 바이럴 부스트: 보더라인(50-70점) 포스트에만 적용하여 비용 절감
  llm_viral_boost: false
  weights:
    scrape_quality: 0.35
    publishability: 0.40
    performance: 0.25

review:
  queue_limit_per_run: 10
  auto_move_to_review_threshold: 60
  reject_on_missing_title: true
  reject_on_missing_content: true
  require_twitter_quality_pass: true
  min_twitter_quality_score: 80

quality_gate:
  max_retries: 2
  review_only_max_retries: 1

analytics:
  lookback_days: 30
  success_window_hours: 24
  top_examples_limit: 5
  minimum_posts_for_feedback: 20

blind:
  email: ""
  password: ""

anthropic:
  enabled: true
  api_key: ""
  model: "claude-haiku-4-5-20251001"  # 비용 최적화: haiku ($0.80/1M) vs sonnet ($3/1M)

gemini:
  enabled: true
  api_key: ""
  model: "gemini-2.5-flash"

deepseek:
  enabled: true
  api_key: ""
  model: "deepseek-chat"

moonshot:
  enabled: true
  api_key: ""
  model: "moonshot-v1-8k"

zhipuai:
  enabled: true
  api_key: ""
  model: "glm-4-flash"

xai:
  enabled: true
  api_key: ""
  model: "grok-4-1-fast-reasoning"

openai:
  enabled: false
  chat_enabled: true
  api_key: ""
  chat_model: "gpt-4o-mini"
  image_model: "dall-e-3"

twitter:
  consumer_key: ""
  consumer_secret: ""
  access_token: ""
  access_token_secret: ""
  enabled: false

limits:
  daily_api_budget_usd: 3.0
  max_posts_per_day: 10

notion:
  api_key: ""
  database_id: ""
  properties:
    title: "콘텐츠"
    memo: "메모"
    status: "상태"
    date: "생성일"
    creator_take: "운영자 해석"
    review_focus: "검토 포인트"
    feedback_request: "피드백 요청"
    risk_flags: "위험 신호"
    evidence_anchor: "근거 앵커"
    rejection_reasons: "반려 사유"
    image_needed: "이미지 필요"
    tweet_body: "트윗 본문"
    url: "Source URL"
    tweet_url: "트윗 링크"
    views: "24h 조회수"
    likes: "24h 좋아요"
    retweets: "24h 리트윗"
    source: "원본 소스"
    feed_mode: "피드 모드"
    topic_cluster: "토픽 클러스터"
    hook_type: "훅 타입"
    emotion_axis: "감정 축"
    audience_fit: "대상 독자"
    scrape_quality_score: "스크랩 품질 점수"
    publishability_score: "발행 적합도 점수"
    performance_score: "성과 예측 점수"
    final_rank_score: "최종 랭크 점수"
    review_status: "승인 상태"
    review_note: "검토 메모"
    chosen_draft_type: "선택 초안 타입"
    newsletter_body: "뉴스레터 초안"
    publish_platforms: "발행 플랫폼"
    publish_channel: "발행 채널"
    published_at: "발행 시각"
    performance_grade: "성과 등급"
  status_default: "검토필요"

image:
  provider: "gemini"   # gemini (free) > pollinations (free) > dalle ($0.04/image)
  # 이미지 프롬프트 최소 단어 수 (미달 시 생성 스킵)
  min_prompt_words: 5
  generate_ai_for_review: false
  generate_ai_for_blind: false

image_hosting:
  provider: "imgur"
  imgur:
    client_id: ""
  cloudinary:
    cloud_name: ""
    api_key: ""
    api_secret: ""

tweet_style:
  tone: "위트 있고 공감 가는"
  max_length: 280
  format: "markdown"
  include_hashtags: false
  hashtags: []

screenshot_dir: "./screenshots"
screenshot_retention_days: 7
scrape_limit: 5
delay_seconds: 5

feed_filter:
  min_engagement_score: 0.0
  fetch_multiplier: 3
  min_editorial_score: 60.0
  min_pre_editorial_score: 35.0

proxy:
  enabled: false
  list: []

request:
  timeout_seconds: 20
  retries: 3
  backoff_seconds: 1.5

scrape_quality:
  min_content_length: 20
  min_korean_ratio: 0.15
  require_title: true
  max_empty_field_ratio: 0.4
  selector_timeout_ms: 5000
  direct_fallback_timeout_ms: 8000
  save_failure_snapshot: true
  failure_snapshot_dir: ".tmp/failures"

dedup:
  # Notion URL 캐시 TTL (분). 캐시 만료 후 Notion에서 URL을 재조회합니다.
  cache_ttl_minutes: 30
  # 중복 판단 대상 과거 일수 (Notion 쿼리 범위)
  lookback_days: 14
  # Gemini 임베딩 기반 시맨틱 중복 검사 활성화 여부
  semantic_enabled: true
  embedding_model: "text-embedding-004"

browser:
  # pool_size > 1 이면 N개 컨텍스트를 동시에 사용 (병렬 스크래핑)
  pool_size: 1

ml:
  # ML 모델 활성화 최소 학습 행 수 (BTX_ML_MIN_ROWS 환경 변수로 오버라이드 가능)
  min_training_rows: 100
  # 재학습 트리거 신규 행 수 (BTX_ML_RETRAIN_ROWS 환경 변수로 오버라이드 가능)
  retrain_threshold: 20

circuit_breaker:
  # 세션 내 프로바이더 실패 허용 횟수 (초과 시 세션 내 스킵)
  session_skip_threshold: 3
  # 첫 번째 영구 스킵 시간 (시간) — fail_count 증가에 따라 지수 증가
  initial_skip_hours: 1.0

cross_source_insight:
  enabled: true
  min_posts: 3
  min_sources: 2

trends:
  enabled: false  # opt-in: Google Trends + Naver DataLab
  google_enabled: true
  naver_enabled: true
  spike_threshold: 80.0
  cache_ttl_minutes: 10

crawl4ai:
  # Crawl4AI LLM extraction fallback (CSS 셀렉터 실패 시 LLM으로 추출)
  provider: "gemini/gemini-2.5-flash"
  timeout_seconds: 30
  verbose: false

viral_filter:
  # AI 바이럴 필터 (노이즈 글 자동 제거)
  enabled: true
  threshold: 40.0  # 0-100, 이 점수 미만은 필터링
  timeout_seconds: 10

sentiment:
  # 감성 분석 트래커 (감정 키워드 트렌드 감지)
  enabled: true
  retention_days: 30  # 감정 데이터 보관 기간

digest:
  # RSSbrew 스타일 일일 다이제스트
  enabled: true
  max_entries: 10  # 다이제스트에 포함할 최대 포스트 수
  send_time: "22:00"  # KST 발송 시각
  telegram_enabled: true

schedule:
  enabled: true
  cron: "0 */3 * * *"
  timezone: "Asia/Seoul"
