  직장개그: 에피소드 모음집 형태, 간결한 문장, 공감 짤방 연상
  부동산: 시세 데이터 + 직장인 관점 분석, 지역별/가격대별 정리
  IT: 기술 트렌드 해설 + 직장인 영향 분석, 용어 설명 포함
  건강: 직장인 건강 가이드, 증상→원인→해결책 구조, 전문가 인용
  정치: 팩트 체크 + 직장인 생활 영향 분석, 중립적 해설
  자기계발: 실행 가능한 루틴 제안, 추천 리소스 포함, 단계별 접근
  금융/경제: 경제 뉴스 해설 + 직장인 자산관리 관점, 그래프/차트 연상
  뷰티/라이프: 제품 리뷰/추천 형태, 직장인 시간 고려한 루틴 제안
