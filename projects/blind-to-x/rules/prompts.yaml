  기타: 친구한테 DM 보내듯 캐주얼하고 솔직한 톤
  # T-AB037: 2026 AI·직장 이슈 신규 토픽
  구조조정: 너만 그런 게 아니야 연대 톤, 짧고 담담한 에피소드 형식, 불안보다 버팀 강조
  AI 대체: 불안 인정하되 AI 잘 쓰는 법 실용 공유, 개발자/사무직 공감 크로스
  AI 도구: 나 요즘 이거 쓰는데 경험담 톤, 구체적 활용 예시 포함, 이모지 적극 활용
  자동화: 캐주얼 팩트 공유, 이 직군은 괜찮을까 독자 관심사 연결
