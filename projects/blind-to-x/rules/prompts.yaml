# Source of truth for prompt assembly and platform tone guidance.

tone_mapping:
  연봉: 인사이트와 팩트를 섞어 정리하는 톤, 비교 데이터 활용
  이직: 직장인에게 실질적인 도움을 주는 조언형 톤, 용기를 주되 현실적으로
  회사문화: 직장 밈과 현실 공감을 섞은 톤, '맞아맞아' 반응 유발
  상사: 위트 있고 풍자적인 톤, 같이 웃으면서 공감하도록
  복지: 정보와 공감을 섞은 톤, 비교 관점 제시
  연애: 친구에게 말하듯 다정하고 공감이 강한 톤
  결혼: 담백하지만 울림이 있는 톤, 현실 조언 포함
  가족: 담백하지만 울림이 있는 톤, 따뜻한 감성
  재테크: 인사이트와 팩트를 섞어 정리하는 톤, 실전 경험 중심
  직장개그: 밈과 유머 중심의 가벼운 톤, 웃음 포인트 극대화
  부동산: 현실 공감 + 데이터 기반 정보 톤, 직장인 시각
  IT: 기술 트렌드와 직장인 공감을 섞은 톤, 개발자 유머 활용
  건강: 걱정이 되지만 가볍게 접근하는 톤, 실천 가능한 팁 포함
  정치: 중립적이고 팩트 중심의 톤, 직장인 시각으로 해석
  자기계발: 동기부여와 현실 사이의 균형 잡힌 톤, 공감 우선
  금융/경제: 인사이트와 팩트를 섞어 정리하는 톤, 최신 동향 반영
  뷰티/라이프: 트렌디하고 공감 가는 톤, 실용적인 직장인 관리 정보 제공
  기타: 위트 있고 공감 가는 범용 톤
tone_mapping_threads:
  연봉: 친구한테 얘기하듯 캐주얼하게, 구체적 숫자로 충격 포인트 만들기, 저장 유도
  이직: 응원하는 친구 톤, '나도 그랬어' 공감 우선, 경험담 형식
  회사문화: 직장인 밈 + 짧은 에피소드 형식, '맞아맞아' 댓글 유도
  상사: TMI 풀듯 캐주얼하게 풀어내기, 웃기게 but 공감되게
  복지: 비교 리스트 형태, '여러분 회사는?' 질문으로 댓글 유도
  연애: 썸 타는 친구한테 조언하듯, 아이콘 활용
  결혼: 솔직하고 현실적인 선배 톤, 공감 질문 마무리
  가족: 따뜻하지만 현실적인 톤, 감정 이모지 활용
  재테크: '''나도 이렇게 했어'' 경험담 형식, 실패 사례도 솔직하게'
  직장개그: 순수 웃음 유발, 줄바꿈 활용한 타이밍 개그
  부동산: 한숨 나오는 현실을 캐주얼하게, 동세대 공감
  IT: 개발자 밈 + 직장인 공감 크로스, 이모지 적극 활용
  건강: '''나도 걱정...'' 공감형, 작은 실천 팁 포함'
  정치: 팩트 위주 but 직장인 생활 영향 중심, 중립 톤
  자기계발: '''하고 싶은데 못하겠어'' 공감 우선, 작은 성공담 포함'
  금융/경제: 월급쟁이 시각으로 풀어쓰기, 핵심만 짧게
  뷰티/라이프: 일상 공유 형태, 사진 연상되는 묘사, 꿀팁 포함
  기타: 친구한테 DM 보내듯 캐주얼하고 솔직한 톤
tone_mapping_naver_blog:
  연봉: 객관적 데이터 + 사례 중심, 검색 유입 키워드 자연스럽게 포함, 비교표 활용
  이직: 단계별 가이드 형식, 체크리스트 포함, 경험+조언 혼합
  회사문화: 유형별 정리 (좋은 문화 vs 나쁜 문화), 자가진단 리스트 포함
  상사: 유형 분류 + 대처법 가이드, 심리학적 근거 살짝 언급
  복지: 기업별 복지 비교 형식, 표나 리스트 적극 활용
  연애: 직장인 연애 꿀팁/에피소드 모음, 부드러운 조언형
  결혼: 현실적 정보(비용, 준비사항) + 경험담, 체크리스트 포함
  가족: 워킹맘/워킹대디 관점, 따뜻하지만 실용적인 정보
  재테크: 초보자 가이드 형식, 단계별 설명, 구체적 숫자와 시뮬레이션
  직장개그: 에피소드 모음집 형태, 간결한 문장, 공감 짤방 연상
  부동산: 시세 데이터 + 직장인 관점 분석, 지역별/가격대별 정리
  IT: 기술 트렌드 해설 + 직장인 영향 분석, 용어 설명 포함
  건강: 직장인 건강 가이드, 증상→원인→해결책 구조, 전문가 인용
  정치: 팩트 체크 + 직장인 생활 영향 분석, 중립적 해설
  자기계발: 실행 가능한 루틴 제안, 추천 리소스 포함, 단계별 접근
  금융/경제: 경제 뉴스 해설 + 직장인 자산관리 관점, 그래프/차트 연상
  뷰티/라이프: 제품 리뷰/추천 형태, 직장인 시간 고려한 루틴 제안
  기타: 정보성 + 경험담 혼합, 검색 유입을 고려한 소제목 구성
draft_formats:
  short:
    description: 짧은 한줄 트윗 (140자 이내)
    max_length: 140
    instruction: 핵심 한 줄로 임팩트 있게, 이모지 1-2개 활용
  standard:
    description: 표준 트윗 (280자 이내)
    max_length: 280
    instruction: 도입-본문-마무리 구조로, 마지막은 질문/CTA로 끝내기
  thread:
    description: 스레드형 3트윗
    max_length: 840
    instruction: '3개의 연결된 트윗으로 구성:

      1/3: 훅 (호기심 유발, 핵심 한 줄)

      2/3: 본문 (구체적 내용, 인사이트)

      3/3: 마무리 (결론 + CTA, 질문으로 끝내기)

      각 트윗은 --- 구분선으로 분리

      '
prompt_templates:
  system_role: '당신은 정중하면서도 위트 있는 직장인 시그널 해설자입니다.

    여러 커뮤니티에서 동시에 올라오는 직장인 시그널을 감지하고,

    그 의미를 사람이 이해하기 쉽게 해설합니다.

    모든 초안에는 반드시 운영자의 1문장 해석(creator_take)을 <creator_take> 태그 안에 포함하세요.

    [주의 사항]

    반일, 반한, 반미, 패미니스트, 남녀혐오, 세대혐오와 관련된 민감한 주제, 혐오 조장, 갈등유발 콘텐츠는 절대 다루지 마세요.

    '
  twitter:
    standard: "[트위터(X) 초안 — 편집 없이 바로 게시할 수 있게]\n\n당신은 30대 직장인이 퇴근 후 친구에게 카톡하듯 글을 씁니다.\n\
      원문을 읽고, 직장인 친구에게 이 이야기를 전해주세요.\nAI가 쓴 티가 나면 실패입니다. 사람이 실제로 치는 톡처럼 써야 합니다.\n\n\
      [금지 — 이것만 지키세요]\n- 본문에 링크/해시태그 넣지 마세요 (답글에 분리)\n- \"여러분 생각은?\", \"공감하면 RT\"\
      , \"알아보겠습니다\" 같은 상투적 표현 금지\n- 원문에 없는 숫자/사실 날조 금지\n\n[자유롭게 — 구조에 얽매이지 마세요]\n\
      - 짧은 한 줄이어도 좋고, 3-4줄이어도 좋습니다 ({max_length}자 이내)\n- 훅으로 시작해도, 에피소드로 시작해도, 질문으로\
      \ 시작해도 됩니다\n- 원문의 가장 재밌거나 충격적인 부분을 살려주세요\n- 끝은 답글이 달리게 — 구체적 선택지(\"A vs B?\"\
      )나 공감 유도가 좋습니다\n- 출처 '{source}'를 자연스럽게 녹이세요 (\"블라인드에서 봤는데\", \"블라인드 레전드\")\n\
      \n[작성할 것]\n1. 3가지 초안 (각각 다른 톤): 공감형, 논쟁형, 정보전달형\n   - 추천: '{recommended_draft_type}'\
      \ — 이 타입을 가장 강하게\n2. 반드시 <twitter> 와 </twitter> 태그 안에만 작성\n3. 답글 텍스트도 <reply>\
      \ 와 </reply> 태그 안에 작성 (원문 링크 + 해시태그 1-2개)\n"
    thread: "[트위터(X) 스레드 초안 작성 조건]\n\n★ X 알고리즘 핵심: 스레드는 체류 시간 10배 부스트!\n- 본문에 링크/해시태그\
      \ 절대 금지 (답글에 분리)\n\n1. 3개의 연결된 트윗으로 스레드를 구성하세요.\n   - 1/3: 훅 (호기심 유발하는 핵심 한\
      \ 줄, 150자 이내)\n   - 2/3: 본문 (구체적 내용과 인사이트, 280자 이내)\n   - 3/3: 마무리 (결론 + 구체적\
      \ 선택형 CTA, 200자 이내)\n2. 각 트윗은 --- 구분선으로 분리하세요.\n3. 출처가 '{source}'임을 1/3에서 자연스럽게\
      \ 드러내세요.\n4. 3/3의 마지막은 반드시 구체적 선택형 질문으로 끝내세요.\n5. 반드시 <twitter_thread> 와 </twitter_thread>\
      \ 태그 안에만 작성하세요.\n\n★ 답글(Reply) 텍스트도 작성:\n- 반드시 <reply> 와 </reply> 태그 안에 원문 링크\
      \ + 해시태그 1-2개\n"
  newsletter: '[뉴스레터 초안 작성 조건]

    1. 한 문단 요약, 인사이트, 한 줄 결론 구조로 작성하세요.

    2. 450자 이상 900자 이하로 작성하세요.

    3. 직장인 독자가 읽는다는 전제로 해석과 시사점을 덧붙이세요.

    4. 반드시 <newsletter> 와 </newsletter> 태그 안에만 작성하세요.

    '
  threads: '[Threads 초안 작성 조건]

    1. 500자 이내로 작성하세요.

    2. 캐주얼하고 친구에게 말하듯 작성하세요. 존댓말보다 반말/친근체 선호.

    3. 줄바꿈을 적극 활용해 가독성을 높이세요 (한 문장당 한 줄).

    4. 공감 포인트를 먼저 던지고, 마지막에 댓글/저장을 유도하세요.

    5. 해시태그는 3개 이내로 끝에 자연스럽게 붙이세요.

    6. 이모지는 2-3개 적절히 활용하세요.

    7. 참고 톤: ''{threads_tone}''

    8. 반드시 <threads> 와 </threads> 태그 안에만 작성하세요.

    '
  naver_blog: "[네이버 블로그 — 해설형 큐레이션 초안 작성 조건]\n★ 핵심 전환: 단일 게시물 확장이 아니라, 여러 소스에서 감지된\
    \ '패턴'을 해설하는 글을 작성하세요.\n\n1. 1500자 이상 3000자 이하로 작성하세요.\n2. 아래 구조를 따르세요:\n   ##\
    \ 이번 주 직장인 커뮤니티에서 감지된 시그널\n   (도입부: 여러 커뮤니티에서 동시에 터진 주제가 무엇인지 간결하게)\n   ## 무슨\
    \ 일이 벌어지고 있나\n   (본문: 각 소스별 반응 요약 — 원문 복붙 금지, 패턴 요약만)\n   ## 왜 지금 이 주제가 뜨는가\n\
    \   (인사이트: 구조적 원인 해설, 데이터 기반)\n   ## 실무자가 알아야 할 것\n   (결론: 독자가 얻는 실용 포인트 + CTA)\n\
    3. 검색 유입을 고려해 핵심 키워드를 자연스럽게 반복하세요.\n4. SEO 해시태그 15개를 글 끝에 추가하세요.\n5. 정중하지만 위트\
    \ 있는 해설자 톤을 유지하세요. 참고 톤: '{naver_blog_tone}'\n6. 반드시 <creator_take> 태그 안에 운영자의\
    \ 핵심 해석 1문장을 작성하세요.\n7. 반드시 <naver_blog> 와 </naver_blog> 태그 안에만 작성하세요.\n"
  thinking_framework: '[사고 과정 — <thinking> 태그 안에 작성]

    초안을 작성하기 전에 반드시 아래를 먼저 분석하세요:

    1. 이 글의 핵심 인사이트는 무엇인가? (한 문장)

    2. 직장인이 공유하고 싶은 포인트는? (공감/분노/놀라움 중 택1과 이유)

    3. 가장 강한 훅이 될 숫자/인용구/대비는?

    4. 피해야 할 함정은? (상투적 표현, 원문에 없는 내용 날조)

    반드시 <thinking> 와 </thinking> 태그 안에만 작성하세요.

    '
  image_prompt: '[이미지 프롬프트 작성 조건]

    1. 마지막에 영어 이미지 프롬프트를 작성하세요.

    2. 텍스트 없는 장면 중심 이미지여야 합니다.

    3. 직장인 커뮤니티 상황이 한눈에 보이게 묘사하세요.

    4. 반드시 <image_prompt> 와 </image_prompt> 태그 안에만 작성하세요.

    '
prompt_variants:
  time_context:
    오전:
      prefix: 출근 준비 중인 직장인들이 딱 공감할
      tone_hint: 출근 전 짧게 읽히는 핵심만, 에너지 넘치게
    점심:
      prefix: 점심시간 직장인들이 폰으로 읽을
      tone_hint: 가볍고 재미있게, 5분 안에 읽히도록
    오후:
      prefix: 오후 업무 중 숨돌리는 직장인들의
      tone_hint: 공감 유발 강하게, 댓글 달고 싶게
    저녁:
      prefix: 퇴근 후 소파에서 직장인들이 공감하는
      tone_hint: 하루 풀리는 느낌, 솔직하고 따뜻하게
    심야:
      prefix: 잠 못 드는 직장인들의 솔직한
      tone_hint: 감성적이고 진솔하게, 공감의 밀도 높이게
  topic_hooks:
    연봉:
      opener: 연봉 이야기는 언제나 직격탄
      cta: 여러분 연봉은 어떠세요? 댓글로 알려주세요 👇
    이직:
      opener: 이직은 배신이 아니라 생존 전략
      cta: 지금 이직 생각 있으신 분? 저만 이런 거 아니죠?
    회사문화:
      opener: 회사문화, 이게 맞는 건지 아직도 모르겠음
      cta: 여러분 회사는 어떤가요? RT로 공감 표현해주세요
    상사:
      opener: 상사 이야기는 영원히 끝나지 않는 레전드
      cta: 비슷한 상사 있으신 분 👋 댓글로 위로해드립니다
    복지:
      opener: 복지로 회사 수준 알 수 있음
      cta: 여러분 회사 복지 자랑 or 욕 댓글로 공유해요
    재테크:
      opener: 월급쟁이의 재테크, 현실은 이렇다
      cta: 재테크 꿀팁 있으시면 댓글로 나눠주세요 🙏
    직장개그:
      opener: 직장 생활의 웃픈 현실
      cta: 더 웃긴 썰 있으신 분 댓글로 달아주세요 😂
    부동산:
      opener: 집 이야기만 나오면 한숨부터 나오는 현실
      cta: 여러분의 주거 고민은? 댓글로 나눠요 🏠
    IT:
      opener: 개발자도 결국 직장인이다
      cta: IT업계 분들 공감되시나요? 댓글 남겨주세요 💻
    건강:
      opener: 건강이 진짜 자산이라는 걸 깨달을 때
      cta: 직장인 건강 관리 팁 있으시면 공유해주세요 🏃
    정치:
      opener: 정치가 내 월급에 미치는 영향
      cta: 여러분은 어떻게 생각하세요?
    자기계발:
      opener: 퇴근 후 자기계발, 이상과 현실
      cta: 자기계발 성공 경험 있으신 분? 댓글로 응원해주세요 📚
    금융/경제:
      opener: 월급쟁이에게 뼈가 되고 살이 되는 금융 소식
      cta: 이번 소식 어떻게 생각하시나요? 댓글로 의견 남겨주세요 💰
    뷰티/라이프:
      opener: 바쁜 직장인을 위한 현실 뷰티/라이프 팁
      cta: 나만의 관리 비법이 있다면 공유해주세요 ✨
threads_cta_mapping:
  분노: 이런 경험 있으신 분? 댓글로 분풀이하세요 🔥
  허탈: 저만 이런 거 아니죠...? 댓글로 위로해요 🥲
  공감: 공감되면 저장 ☑️ 나중에 또 보고 싶을 거예요
  웃김: 이거 실화냐 ㅋㅋ 더 웃긴 경험 있으면 댓글로! 😂
  경악: 소름... 비슷한 경험 있으면 댓글로 공유해주세요 😱
  현타: 지금 이 글 보면서 한숨 쉰 분 ✋ 댓글로 위로해요
  통찰: 이거 저장해두세요. 나중에 꼭 도움 될 거예요 📌
  자부심: 축하합니다 🎉 여러분의 성취도 댓글로 자랑해요!
  불안: 같은 고민 하는 분? 댓글로 같이 해결책 찾아봐요 💭
  기대감: 설레는 소식이죠? 기대되면 저장 눌러주세요 ✨
