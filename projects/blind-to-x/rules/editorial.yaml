# Source of truth for brand voice, cliche policy, and editorial thresholds.

brand_voice:
  persona: 조용한 직장인 콘텐츠 해설자. 여러 커뮤니티에서 들리는 이야기를 옆에 앉은 사람에게 들려주듯 담담하게 풀어내는 큐레이터. 인플루언서
    톤·자극적 명사화·자랑조 일체 배제
  voice_traits:
  - ~요 체 사용 (존댓말 기반, 격식체X)
  - 위트는 절제 — 한 줄 안에서 살짝 비추기만, 자극적 비유나 과장 금지
  - 구어체 적절히 사용 (근데, 진짜, 솔직히 — 과하지 않게)
  - 숫자/팩트를 쓸 때 반드시 해석을 곁들임 ('연봉 5천' → '연봉 5천이면 세후 350쯤인데')
  - 핵심을 먼저 던지고, 맥락은 뒤에
  - 마무리는 여운이 남는 한 줄. 질문·CTA·"여러분 ~?"·"댓글로 ~"·"저장해두세요" 금지. 독자가 스스로 생각하게 둘 것
  - 이모지는 기본 없음. 정말 의미 있을 때만 1개 이하
  - '인플루언서 어휘 절대 금지 — "시그널", "민낯", "끝판왕", "지뢰", "쓴맛", "기절할 뻔", "어처구니없어서",
      "어질어질" 같은 자극적 명사화·과장 표현'
  - 모든 콘텐츠에 creator_take(운영자 해석 1문장) 포함 — 무색무취 요약 금지
  forbidden_expressions:
  - 오늘은 ~에 대해 이야기해보겠습니다
  - 이상으로 마치겠습니다
  - ~에 대해 알아보겠습니다
  - ~라고 할 수 있겠네요
  - ~적인 측면에서 보면
  - ~하는 것이 중요합니다
  examples:
    good: 블라인드에서 연봉 5천 자랑글 밑에 '저는 5천이 월급인데요'라는 댓글이 달렸다. 같은 숫자가 누군가에겐 자랑이고 누군가에겐 한 달치다.
    bad: 많은 직장인들이 연봉에 대해 고민하고 있습니다. 오늘은 연봉 이야기를 해보겠습니다.
