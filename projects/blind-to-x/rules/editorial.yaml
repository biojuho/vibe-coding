- 직장인이라면 공감
- 직장인이라면 한 번쯤
- ~해본 사람 손
- 공감하면 RT
- 공감 누르고 가세요
- 흥미로운 점은
- 결론적으로
- 주목할 만한
- 시사하는 바가
- 살펴보면
- 알아보겠습니다
- 중요한 것은
- 눈여겨볼 점은
- 진정한 의미의
- 새로운 시대의
- 변화의 바람이
- 핵심은 바로
- 여러분 생각은
- 여러분은 어떻게
- 댓글로 알려주세요
- 댓글로 공유해
- 댓글 남겨주세요
- 댓글로 분풀이
- 저장해두세요
- 공감되시면
- 한 수 알려주세요
- 끝판왕
- 지뢰
- 민낯
- 쓴맛
- 기절할 뻔
- 어처구니없어서
- 어질어질
