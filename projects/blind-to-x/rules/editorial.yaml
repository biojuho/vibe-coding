editorial_thresholds:
  defaults:
    twitter: 6.5
    threads: 6.0
    naver_blog: 7.0
    newsletter: 6.0
  topic_overrides:
    연봉:
      twitter: 7.0
      naver_blog: 7.5
    재테크:
      twitter: 7.0
      naver_blog: 7.5
    이직:
      twitter: 6.5
    직장개그:
      twitter: 5.5
      threads: 5.5
    IT:
      naver_blog: 7.0
x_editorial_rules:
  defaults:
    reader_desire: 직장인이 자기 얘기로 느낄 만한 현실감
    emotion_lane: 공감과 웃음이 같이 남는 톤
    spinoff_patterns:
    - 댓글 반응
    - 현실 비교
    - 내 경험 투영
    must_have_anchors:
    - 숫자
    - 장면
    - 대사
    - 회사 맥락
    dull_angle_patterns:
    - 중요한 이유
    - 요즘 사람들
    - 현실적으로
    - 생각해봅시다
    - 결론적으로
    safe_conflict_rules:
    - 사람을 공격하지 말고 상황을 해석한다
    - rage-bait 대신 체감 차이와 현실 비교를 쓴다
    - 웃기더라도 직장인 독자가 스스로를 떠올릴 여지를 남긴다
    workplace_keywords:
    - 직장
    - 회사
    - 팀
    - 상사
    - 대표
    - 면접
    - 연봉
    - 월급
    - 성과급
    - 출근
    - 퇴근
    - 이직
    rage_bait_patterns:
    - 실화냐
    - 레전드
    - 충격
    - 미쳤다
    - 소름
    - 분노주의
    - 논란
  topics:
    연봉:
      reader_desire: 내 월급과 비교해보고 싶은 욕구
      emotion_lane: 웃기지만 씁쓸한 공감
      spinoff_patterns:
      - 세전/세후 체감
      - 회사별 격차
      - 댓글 반응
      must_have_anchors:
      - 실수령
      - 숫자
      - 비교
      - 한숨
    이직:
      reader_desire: 지금 회사에 남을지 떠날지 가늠해보고 싶은 욕구
      emotion_lane: 불안과 해방감이 같이 오는 공감
      spinoff_patterns:
      - 퇴사 계기
      - 면접 경험
      - 합격 후 체감
      must_have_anchors:
      - 사직서
      - 면접
      - 출근
      - 결정의 순간
    회사문화:
      reader_desire: 우리 회사만 이런가 확인하고 싶은 욕구
      emotion_lane: 웃픈 공감
      spinoff_patterns:
      - 팀별 온도차
      - 상사 반응
      - 댓글 인증
      must_have_anchors:
      - 회의실
      - 메신저
      - 단톡방
      - 출근 루틴
    상사:
      reader_desire: 내 상사와 비교하며 풀고 싶은 욕구
      emotion_lane: 웃기지만 짜증나는 공감
      spinoff_patterns:
      - 멘트 재연
      - 팀장 유형
      - 대처 경험
      must_have_anchors:
      - 대사
      - 면담
      - 회의
      - 카톡
    재테크:
      reader_desire: 내 돈 감각과 비교해보고 싶은 욕구
      emotion_lane: 현실적인 한숨과 작은 욕심
      spinoff_patterns:
      - 실수령 후 투자
      - 손익 체감
      - 월급쟁이 관점
      must_have_anchors:
      - 숫자
      - 수익률
      - 월급
      - 생활비
    직장개그:
      reader_desire: 같이 웃고 넘길 직장 밈을 찾는 욕구
      emotion_lane: 가볍게 웃다가 현실이 떠오르는 톤
      spinoff_patterns:
      - 댓글 밈
      - 내 팀 버전
      - 실제 재연
      must_have_anchors:
      - 표정
      - 대사
      - 짧은 장면
      - 반전
    가족:
      reader_desire: 회사 밖 가족 현실과 연결해 공감받고 싶은 욕구
      emotion_lane: 따뜻하지만 현실적인 공감
      spinoff_patterns:
      - 부모 반응
      - 육아와 직장 병행
      - 퇴근 후 체감
      must_have_anchors:
      - 퇴근
      - 식탁
      - 전화
      - 집
    결혼:
      reader_desire: 일과 관계 사이의 현실을 비교해보고 싶은 욕구
      emotion_lane: 민망하지만 진짜 같은 공감
      spinoff_patterns:
      - 비용 체감
      - 주변 반응
      - 결정의 순간
      must_have_anchors:
      - 소개팅
      - 예식장
      - 축의금
      - 대화
    IT:
      reader_desire: 기술 이슈가 내 일에 어떤 영향을 주는지 알고 싶은 욕구
      emotion_lane: 빠르게 이해되는 통찰과 공감
      spinoff_patterns:
      - 실무 번역
      - 업계 체감
      - 개발자 댓글
      must_have_anchors:
      - 업무 툴
      - 배포
      - 회의
      - 장애
    건강:
      reader_desire: 몸이 보내는 신호를 직장 생활에 비춰보고 싶은 욕구
      emotion_lane: 걱정되지만 바로 실천할 수 있는 공감
      spinoff_patterns:
      - 증상 체감
      - 직장 루틴 변화
      - 작은 실천
      must_have_anchors:
      - 목
      - 허리
      - 야근
      - 출근길

# Quality-gate detection patterns. Externalized from
# pipeline/draft_quality_gate.py so editorial-only changes don't require a
# code edit (T-1202, 2026-05-28). When a key is missing or yaml fails to
# load, draft_quality_gate.py falls back to the historical hardcoded
# constants — so deleting this section is safe (degrades to old behavior).
quality_gate_patterns:
  generic_cta_regex: '(여러분 생각은|여러분은 어떻게|여러분도|어떻게 생각|어떠신가요|공감하시나요|공감하면|공감되면|다들 공감|너희 생각|너희도)\??'
  cliche_opening_regex: '(오늘은 .*이야기해보|많은 .* 고민하고 있|현실적으로|결론적으로|요즘 사람들|한번 생각해봅시다)'
  closing_cta_regex: '(댓글로|저장해|공감하면|RT 부탁|리트윗 부탁|구독 부탁|팔로우 부탁|좋아요 부탁|한 수 알려|의견 알려|어떻게 생각|어떠신가요|공감되시면|아닐까요|아닐까\??$|않을까요|않을까\??$)'
  influencer_vocab:
  - 끝판왕
  - 민낯
  - 쓴맛
  - 기절할 뻔
  - 어처구니없
  - 어질어질
  - 한 수 알려
  - 정신 차리고 봐
  - 현실 자각 타임
  - 팩폭
  - 팩폭당
  - 레전드
