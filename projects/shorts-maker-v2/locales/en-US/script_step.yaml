field_names:
  narration: "narration"
  visual_prompt: "visual_prompt"

channel_review_criteria:
  health:
    extra_dimensions: |
      source_score : Does the script cite specific data sources (e.g. WHO, specific studies)? (1=no sources, 10=multiple cited)
      safety_score : Does the script avoid dangerous medical claims, unverified treatments, or misleading health info? (1=dangerous, 10=fully safe)
    extra_keys:
      - "source_score"
      - "safety_score"
    min_score_override: 8
    context_note: "This is a HEALTH/MEDICAL channel. Patient safety is paramount. Score very strictly on safety_score. Any unverified medical claim = score 1."
  ai_tech:
    extra_dimensions: |
      data_score : Does the script use specific numbers, dates, or data points rather than vague claims? (1=all vague, 10=data-rich)
    extra_keys:
      - "data_score"
    min_score_override: 7
    context_note: "This is an AI/TECH channel targeting developers and tech enthusiasts. Vague hype without specifics should score low on data_score."
  psychology:
    extra_dimensions: |
      empathy_score : Does the script feel warm, relatable, and emotionally safe? (1=cold/clinical, 10=deeply empathetic)
    extra_keys:
      - "empathy_score"
    min_score_override: 7
    context_note: "This is a PSYCHOLOGY channel focused on emotional safety and self-understanding. Cold academic tone should score low on empathy_score."
  history:
    extra_dimensions: |
      narrative_score : Does the script tell a compelling story with dramatic tension? (1=boring list, 10=gripping narrative)
    extra_keys:
      - "narrative_score"
    min_score_override: 7
    context_note: "This is a HISTORY channel. Dry chronological lists should score low. Dramatic storytelling with twists scores high."
  space:
    extra_dimensions: |
      wonder_score : Does the script evoke a sense of awe and cosmic scale? (1=mundane, 10=mind-blowing wonder)
    extra_keys:
      - "wonder_score"
    min_score_override: 7
    context_note: "This is a SPACE/ASTRONOMY channel. Content should make viewers feel the vastness and wonder of the cosmos. Use analogies to convey scale."

review_copy:
  base_review_system: |
    You are a YouTube Shorts script quality evaluator.
    Score the given script on these dimensions from 1-10:
      hook_score : How instantly does the Hook stop the scroll?
        Score 1-3 (FAIL): Starts with 'Today we', 'In this video', 'Have you ever', or a generic premise setup.
        Score 4-6 (MEDIOCRE): Has some urgency but feels predictable; lacks a true curiosity gap.
        Score 7-8 (GOOD): Counterintuitive fact, paradox, or hyper-relatable problem in under 15 English words. Creates curiosity gap.
        Score 9-10 (EXCELLENT): Specific + shocking + curiosity gap in ONE punchy sentence. Viewer cannot scroll past.
        Deduct 2 points if the hook ends with a cliché question ('Did you know?', 'Have you ever wondered?').
      flow_score : How naturally does the Body build knowledge and connect scenes?
        Score 1-3 (FAIL): Scenes feel like disconnected bullet points with no connective tissue.
        Score 4-6 (MEDIOCRE): Has some flow but order feels arbitrary; scenes could be rearranged without loss.
        Score 7-8 (GOOD): Analogy → fact → cause/solution flows naturally. Viewer never wonders "why is this here?"
        Score 9-10 (EXCELLENT): Body builds like a mini-story — the analogy makes the fact land harder, the solution feels inevitable.
      cta_score  : How well does the closing leave a quiet, lingering afterimage?
        Score 1-3 (FAIL): Contains action demands (subscribe, like, comment, follow, save), or an abrupt cut.
        Score 4-6 (MEDIOCRE): Ends without action demand but feels flat; no emotional resonance.
        Score 7-8 (GOOD): Ends with a gentle observation or poetic thought that stays with the viewer.
        Score 9-10 (EXCELLENT): A single sentence that distills the entire video's meaning into a new perspective.
      verifiability_score : Can a viewer Google each factual claim within 60 seconds and confirm it?
        Score 1-3 (FAIL): Claims feel invented or use suspiciously precise numbers without any traceable source.
        Score 4-6 (MEDIOCRE): Broadly true but overly specific numbers without obvious sourcing.
        Score 7-8 (GOOD): All claims are well-known consensus facts or cite obvious sources (NASA, WHO, major studies).
        Score 9-10 (EXCELLENT): Every claim is universally known or tied to a specific verifiable event/study. Zero fabrication risk.
      spelling_score : Is the English spelling, grammar, and punctuation clean and natural for spoken delivery? (1=many issues, 10=excellent)
  feedback_rule: |
    Also provide a brief 'feedback' string (max 80 chars) with the main weakness.
  output_rule: 'Output ONLY valid JSON: {{{json_example}, "feedback": "..."}}'

prompt_copy:
  hook_rules: |
    Hook rules:
      - {hook_rule}
      - Stop the scroll within 3 seconds. One or two punchy spoken sentences.
      - {narration_field}: up to {hook_max} English characters (short and punchy).
  body_rules: |
    Body rules:
      - Build depth in this order: analogy first -> fact or data -> cause or solution.
      - Each body scene should naturally flow into the next. No bullet points.
      - {narration_field}: {body_min}-{body_max} English characters (detailed and spoken).
  cta_rules: |
    CTA rules:
      - Suggest ONE specific, immediate real-world action the viewer can do right now.
      - Do NOT mention subscriptions, likes, follows, or channel actions.
      - After the action, add one sentence of creator insight, like a personal takeaway or observation.
      - {narration_field}: up to {cta_max} English characters (brief and direct).
  closing_rules: |
    Closing rules (IMPORTANT — this channel uses quiet endings, NOT CTAs):
      - End with a contemplative thought that lingers in the viewer's mind.
      - Think of it as the last line of a bedtime story — leave an afterimage.
      - NO action demands. NO 'subscribe/like/comment'. NO imperative commands.
      - A gentle observation, a poetic question, or a moment of wonder works best.
      - {narration_field}: up to {cta_max} English characters.
      - structure_role for the last scene must be "closing".
  korean_rules: |
    English Writing Rules (CRITICAL):
      - All {narration_field} text must be natural spoken English.
      - Check spelling, punctuation, and contractions for fluency.
      - Avoid stiff textbook phrasing or unnatural repetition.
      - Proofread each {narration_field} line before outputting.
  user_instructions: |
    Write a Hook-Body-Closing script for YouTube Shorts in natural spoken English:
      Hook    - Open with a surprising fact or relatable problem. Stop the scroll instantly.
      Body    - Guide through analogy -> data or fact -> cause or solution. Build naturally.
      Closing - End with a quiet, lingering thought that stays with the viewer.
                No action demands, no subscription requests, no imperative commands.
