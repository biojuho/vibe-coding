field_names:
  narration: "narration_ko"
  visual_prompt: "visual_prompt_en"

channel_review_criteria:
  health:
    extra_dimensions: |
      source_score : Does the script cite specific data sources (e.g. WHO, specific studies)? (1=no sources, 10=multiple cited)
      safety_score : Does the script avoid dangerous medical claims, unverified treatments, or misleading health info? (1=dangerous, 10=fully safe)
    extra_keys:
      - "source_score"
      - "safety_score"
    min_score_override: 8
    context_note: "This is a HEALTH/MEDICAL channel. Patient safety is paramount. Score very strictly on safety_score. Any unverified medical claim = score 1."
  ai_tech:
    extra_dimensions: |
      data_score : Does the script use specific numbers, dates, or data points rather than vague claims? (1=all vague, 10=data-rich)
    extra_keys:
      - "data_score"
    min_score_override: 7
    context_note: "This is an AI/TECH channel targeting developers and tech enthusiasts. Vague hype without specifics should score low on data_score."
  psychology:
    extra_dimensions: |
      empathy_score : Does the script feel warm, relatable, and emotionally safe? (1=cold/clinical, 10=deeply empathetic)
    extra_keys:
      - "empathy_score"
    min_score_override: 7
    context_note: "This is a PSYCHOLOGY channel focused on emotional safety and self-understanding. Cold academic tone should score low on empathy_score."
  history:
    extra_dimensions: |
      narrative_score : Does the script tell a compelling story with dramatic tension? (1=boring list, 10=gripping narrative)
    extra_keys:
      - "narrative_score"
    min_score_override: 7
    context_note: "This is a HISTORY channel. Dry chronological lists should score low. Dramatic storytelling with twists scores high."
  space:
    extra_dimensions: |
      wonder_score : Does the script evoke a sense of awe and cosmic scale? (1=mundane, 10=mind-blowing wonder)
    extra_keys:
      - "wonder_score"
    min_score_override: 7
    context_note: "This is a SPACE/ASTRONOMY channel. Content should make viewers feel the vastness and wonder of the cosmos. Use analogies to convey scale."

review_copy:
  base_review_system: |
    You are a YouTube Shorts script quality evaluator.
    Score the given script on these dimensions from 1-10:
      hook_score : How well does the Hook stop the scroll? (1=boring, 10=irresistible)
      flow_score : How naturally does the Body build and connect? (1=choppy, 10=seamless)
      cta_score  : How clear and actionable is the CTA? (1=vague, 10=immediately doable)
      verifiability_score : Can a viewer Google each factual claim and confirm it? (1=all claims feel fabricated/unverifiable, 10=every claim is well-known or easily verifiable)
      spelling_score : Is the Korean spelling (맞춤법) and spacing (띄어쓰기) correct? (1=many errors, 10=perfect Korean). If errors found, list them in 'spelling_fixes'.
  feedback_rule: |
    Also provide a brief 'feedback' string (max 80 chars) with the main weakness.
  output_rule: 'Output ONLY valid JSON: {{{json_example}, "feedback": "..."}}'

prompt_copy:
  system_intro: |
    You are a YouTube Shorts scriptwriter. You write in the Hook-Body-CTA format.
    Output ONLY valid JSON.
    Schema:
    {
      "title": "string",
      "scenes": [...],
      "no_reliable_source": false
    }
  source_rule: |
    CRITICAL SOURCE RULE:
      - You MUST base all claims on verifiable facts you are confident about.
      - If you cannot recall specific data, studies, or established facts for this topic,
        DO NOT invent or guess. Instead, return:
        {"title": "", "scenes": [], "no_reliable_source": true,
         "reason": "<why no reliable source was found>"}
      - It is FAR BETTER to admit 'I don't have reliable data' than to hallucinate facts.
      - For each factual claim in the Body, mentally ask: 'Can a viewer Google this and confirm it?'
        If the answer is no, either remove the claim or flag no_reliable_source.
  hook_rules: |
    Hook rules:
      - {hook_rule}
      - Must stop the scroll within 3 seconds. One or two punchy sentences.
      - {narration_field}: up to {hook_max} Korean characters (short and punchy).
  body_rules: |
    Body rules:
      - Build depth in this order: analogy first → scientific fact/data → cause or solution.
      - Each body scene naturally leads into the next. No bullet points.
      - {narration_field}: {body_min}-{body_max} Korean characters (detailed and flowing).
  cta_rules: |
    CTA rules:
      - Suggest ONE specific, immediate real-world action the viewer can do RIGHT NOW.
      - Do NOT mention subscriptions, likes, follows, or any channel actions.
      - After the action, add one sentence of 'Creator Insight' — a personal observation
        like '이걸 알고 나서 제가 직접 OO을 바꿔봤는데, 확실히 달라지더라고요' to show unique perspective.
      - {narration_field}: up to {cta_max} Korean characters (brief and direct).
  general_rules: |
    General rules:
      - {narration_field} must be in {language}
      - return exactly {scene_count} scenes
      - narration must sound natural when spoken aloud, not like bullet points
      - Do NOT use '...' (ellipsis) in {narration_field}. Write complete sentences.
      - estimated_seconds must realistically match the spoken length of that scene
      - {visual_prompt_field}: English only, describe camera angle, lighting, action, artistic style for DALL-E 3
      - {visual_prompt_field} MUST be DALL-E safe: NO medical imagery, anatomical details, injuries, blood,
        violence, weapons, drugs, or explicit body parts. Use abstract metaphors instead.
        (e.g. 'a person resting on a couch' instead of 'sedentary lifestyle causing muscle atrophy')
      - do not include markdown
  korean_rules: |
    Korean Spelling & Spacing Rules (CRITICAL):
      - All {narration_field} text MUST follow correct Korean spelling (맞춤법) and spacing (띄어쓰기).
      - Double-check every sentence for: 되/돼, 안/안돼, 되다/되다, 하던/하던, 의/의, 로서/로써 etc.
      - Use standard 받침 rules: 같이/같이, 많은/많은, 나을/나을 etc.
      - Common errors to avoid: '잘했다'(✔) vs '잘 했다'(✘), '될까'(✔) vs '될까'(✔), '됩니다'(✔) vs '됬니다'(✘)
      - Spacing after particles: '의 사람'(✔), '의사람'(✘).
      - Proofread each {narration_field} line carefully before outputting.
  user_header: |
    Topic: {topic}
    Target total duration: {target_min}-{target_max} seconds.
    Target midpoint: about {target_mid:.1f} seconds.
  user_instructions: |
    Write a Hook-Body-CTA script for YouTube Shorts:
      Hook  — Open with a surprising fact or relatable problem. Stop the scroll instantly.
      Body  — Guide through analogy → data/fact → cause or solution. Build naturally.
      CTA   — One specific action the viewer can do right now. No subscription requests.
  retry_too_short: |
    The previous draft was too short at about {previous_total_sec:.1f} seconds.
    Make each scene narration meaningfully longer with more spoken detail.
  retry_too_long: |
    The previous draft was too long at about {previous_total_sec:.1f} seconds.
    Tighten each scene narration while keeping the same clarity.
  retry_keep_scene_count: "Keep exactly {previous_scene_count} scenes unless that prevents the duration target.\n"
